<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#111111">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="The Forge">
<title>The Forge</title>
<link rel="manifest" href="forge.webmanifest">
<link rel="icon" href="forge-icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="forge-icon.svg">
<style>
:root{
  --bg:#111111;--topbar:#161514;--card:#1c1c1e;--card2:#232227;--inset:#111111;--strip:#2a1e18;
  --ink:#e8e1d2;--ink2:#b8b2a6;--muted:#8a8580;
  --brass:#b68a5a;--gold:#c49a4a;--olive:#b28358;--oxide:#942111;--forest:#4e7a5b;
  --line:#2f2c28;--line2:#3a352f;
  --shadow:0 12px 32px #00000066;
  --serif:Georgia,"Times New Roman",serif;
  --mono:ui-monospace,"SF Mono","Roboto Mono",Menlo,Consolas,monospace;
  --sans:"Helvetica Neue",Arial,system-ui,-apple-system,sans-serif;
  /* legacy aliases → dark forge palette so every existing class keeps resolving */
  --paper:var(--bg);--paper2:var(--card);--paper3:var(--card2);--desk:#0c0c0c;
  --obsidian:var(--bg);--espresso:var(--topbar);--panel:var(--card);--panel2:var(--card2);
  --bone:var(--ink);--sand:var(--ink2);--camel:var(--olive);--amber:var(--gold);
}
*{box-sizing:border-box}
html{background:var(--bg);color:var(--ink);font-family:var(--sans);-webkit-text-size-adjust:100%}
body{margin:0;min-height:100vh;background:radial-gradient(circle at 20% -10%,#2a1c1233,transparent 40%),var(--bg)}
button,input,select,textarea{font:inherit;color:inherit}
button{cursor:pointer}
.hidden{display:none!important}
.muted{color:var(--muted)}
.danger{color:#d0674f}.good{color:#7fb08a}.amber{color:var(--gold)}
.mono{font-family:var(--mono)}.serif{font-family:var(--serif)}

#app{max-width:1180px;margin:auto;background:transparent;min-height:100vh;
  padding:env(safe-area-inset-top) 14px calc(20px + env(safe-area-inset-bottom))}

.topbar{position:sticky;top:0;z-index:40;display:flex;align-items:center;gap:12px;
  padding:14px 4px 12px;background:linear-gradient(var(--bg) 80%,transparent)}
.brand{font:700 23px var(--serif);letter-spacing:.02em;color:var(--ink)}
.brand small{display:block;font:700 9px var(--mono);color:var(--brass);letter-spacing:.2em;margin-top:4px;text-transform:uppercase}
.spacer{flex:1}
.sync{font:700 10px var(--mono);letter-spacing:.08em;text-transform:uppercase;border:1px solid var(--line);
  padding:6px 10px;border-radius:8px;background:var(--card);color:var(--ink2)}
.iconbtn{border:1px solid var(--line);background:var(--card);color:var(--ink);border-radius:9px;padding:9px 11px}

/* TOP horizontal nav (was bottom bar) */
.nav{position:sticky;top:56px;z-index:35;display:flex;flex-wrap:wrap;gap:5px;margin:0 0 16px;
  padding:8px 4px;background:var(--bg);border-top:1px solid var(--line);border-bottom:1px solid var(--line)}
.nav button{flex:0 0 auto;border:1px solid transparent;color:var(--ink2);background:transparent;
  padding:8px 13px;border-radius:8px;font:700 10px var(--mono);text-transform:uppercase;letter-spacing:.08em}
.nav button:hover{color:var(--ink)}
.nav button.active{background:var(--brass);color:#161514}

.view{display:none}.view.active{display:block}

.hero{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin:2px 0 16px}
.metric,.card{border:1px solid var(--line);background:var(--card);border-radius:12px;box-shadow:var(--shadow)}
.metric{padding:14px;min-height:92px}
.metric .label{font:700 9px var(--mono);color:var(--muted);text-transform:uppercase;letter-spacing:.13em}
.metric .value{font:700 27px/1 var(--serif);margin-top:9px;color:var(--gold)}
.metric .sub{font:11px var(--mono);color:var(--ink2);margin-top:6px}
.card{padding:16px;margin-bottom:12px}
.card h2,.card h3{margin:0 0 10px;font-family:var(--serif);font-weight:700}
.card h3{font-size:16px}

.section-title{display:flex;align-items:center;gap:10px;margin:20px 0 10px}
.section-title h2{font:700 20px var(--serif);margin:0;color:var(--ink);white-space:nowrap}
.section-title .rule{height:1px;background:var(--line2);flex:1}

.quote{padding:16px 18px;border-left:3px solid var(--brass);background:var(--card)}
.quote blockquote{margin:0;font:italic 18px/1.4 var(--serif);color:var(--ink)}
.quote cite{display:block;margin-top:8px;font:700 9px var(--mono);color:var(--brass);letter-spacing:.12em;font-style:normal;text-transform:uppercase}

.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.stack{display:grid;gap:8px}
.between{display:flex;justify-content:space-between;gap:10px;align-items:center}

.pill{display:inline-flex;align-items:center;gap:5px;padding:3px 8px;border-radius:999px;border:1px solid var(--line2);
  font:700 10px var(--mono);letter-spacing:.04em;color:var(--ink2);background:var(--inset)}
.pill.p1{background:#94211122;border-color:var(--oxide);color:#e0917f}
.pill.p2{background:#c49a4a1c;border-color:var(--gold);color:var(--gold)}
.pill.p3,.pill.p4{background:#b68a5a18;border-color:var(--brass);color:var(--brass)}
.pill.done{border-color:var(--forest);color:#8fc39b;background:#4e7a5b18}
.pill.overdue{background:#94211126;border-color:var(--oxide);color:#e0917f}
.clock{font:700 15px var(--mono);color:var(--gold)}

.btn{border:1px solid var(--line2);background:var(--card2);color:var(--ink);border-radius:9px;padding:9px 12px;font-weight:600}
.btn:hover{border-color:var(--brass)}
.btn.primary{background:var(--brass);border-color:var(--brass);color:#161514;font-weight:800}
.btn.danger{background:#7a2114;border-color:var(--oxide);color:#fff}
.btn.good{background:#31533b;border-color:var(--forest);color:#fff}
.btn.small{padding:6px 9px;font-size:12px}
.btn.ghost{background:transparent}
.btn:disabled{opacity:.4;cursor:not-allowed}

label{font:700 9px var(--mono);color:var(--brass);text-transform:uppercase;letter-spacing:.09em}
.field{display:grid;gap:5px}
.input,input,select,textarea{width:100%;background:var(--inset);border:1px solid var(--line2);border-radius:9px;
  color:var(--ink);padding:10px;outline:none}
.input:focus,input:focus,select:focus,textarea:focus{border-color:var(--brass)}
textarea{min-height:110px;resize:vertical}
.formgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.formgrid .wide{grid-column:span 2}.formgrid .full{grid-column:1/-1}

.item{padding:11px;border:1px solid var(--line);border-radius:10px;background:var(--inset)}
.item+.item{margin-top:7px}
.item-title{font-weight:700}
.item-meta{font:10px var(--mono);color:var(--muted);margin-top:4px}
.check{display:flex;align-items:flex-start;gap:9px}
.check input{width:auto;margin-top:3px;accent-color:var(--brass)}
.domain-head{padding:10px 0;border-bottom:1px solid var(--line2);font:700 16px var(--serif)}
details{border:1px solid var(--line);border-radius:10px;background:var(--inset);margin:7px 0}
summary{cursor:pointer;padding:11px;list-style:none;font-weight:600}
summary::-webkit-details-marker{display:none}
.tree-body{padding:0 10px 10px}
.indent{margin-left:14px;border-left:1px solid var(--line2);padding-left:11px}

.progress{height:8px;border-radius:99px;background:#000;overflow:hidden;border:1px solid var(--line2)}
.progress>i{display:block;height:100%;background:linear-gradient(90deg,var(--olive),var(--gold));width:0}
.roster{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.chip{border:1px solid var(--line2);background:var(--inset);color:var(--ink2);padding:11px;border-radius:9px;text-align:left;font-weight:600}
.chip.done{background:#31533b;border-color:var(--forest);color:#fff}
.chip.season{border-style:dashed}
.chip.flag{border-color:var(--gold);color:var(--gold)}

.timeline{position:relative;height:92px;border:1px solid var(--line2);border-radius:10px;background:linear-gradient(#1a120c,#140f0b);overflow:hidden}
.timeline .gridline{position:absolute;top:0;bottom:0;width:1px;background:#ffffff10}
.timeline .gridlabel{position:absolute;bottom:3px;transform:translateX(-50%);font:9px var(--mono);color:var(--muted)}
.event-block{position:absolute;top:12px;height:48px;background:#6d532e;border:1px solid var(--brass);border-radius:5px;
  overflow:hidden;padding:4px;font:9px var(--mono);color:var(--ink)}
.nowline{position:absolute;top:0;bottom:0;width:2px;background:var(--oxide);z-index:4}

.timer{font:800 clamp(50px,15vw,108px)/1 var(--mono);letter-spacing:-.05em;text-align:center;margin:18px 0;color:var(--gold)}
.heat{text-align:center;font:700 12px var(--mono);color:var(--brass);letter-spacing:.08em}

.book{display:grid;grid-template-columns:78px 1fr auto;gap:10px;align-items:start;padding:10px;border-bottom:1px solid var(--line)}
.book:last-child{border:0}
.book-actions{display:flex;gap:6px;flex-wrap:wrap}
.statusbtn{font:700 9px var(--mono);text-transform:uppercase;border:1px solid var(--line2);background:var(--inset);color:var(--ink2);border-radius:8px;padding:7px}
.statusbtn.read{border-color:var(--forest);color:#8fc39b}
.statusbtn.reading{border-color:var(--gold);color:var(--gold)}

.modalback{position:fixed;inset:0;z-index:100;background:#000c;display:grid;place-items:center;padding:15px}
.modal{width:min(680px,100%);max-height:90vh;overflow:auto;background:var(--card);border:1px solid var(--brass);
  border-radius:14px;padding:18px;box-shadow:0 30px 90px #000}
.toast{position:fixed;z-index:120;left:50%;bottom:28px;transform:translateX(-50%);padding:10px 14px;border-radius:9px;
  background:var(--ink);color:var(--bg);font:600 12px var(--mono);box-shadow:var(--shadow)}

.ledger{font:11px var(--mono);width:100%;border-collapse:collapse}
.ledger th,.ledger td{text-align:left;padding:7px;border-bottom:1px solid var(--line);vertical-align:top}
.ledger th{color:var(--brass);text-transform:uppercase;letter-spacing:.06em}
.tabs-toggle{display:inline-flex;border:1px solid var(--line2);border-radius:9px;overflow:hidden}
.tabs-toggle button{border:0;background:var(--inset);color:var(--ink2);padding:8px 12px;font-weight:600}
.tabs-toggle button.active{background:var(--brass);color:#161514}

.authgate{position:fixed;inset:0;z-index:200;background:var(--bg);display:grid;place-items:center;padding:16px}
.authbox{width:min(500px,100%);background:var(--card);border:1px solid var(--brass);border-radius:14px;padding:20px}
.sql{font:11px/1.45 var(--mono);white-space:pre-wrap;background:#000;padding:11px;border-radius:9px;
  border:1px solid var(--line2);max-height:250px;overflow:auto;color:var(--ink2)}
.test-pass{color:#7fb08a}.test-fail{color:#d0674f}

@media(max-width:820px){
  .hero{grid-template-columns:1fr 1fr}
  .grid2{grid-template-columns:1fr}
  .grid3{grid-template-columns:1fr}
  .roster{grid-template-columns:1fr 1fr}
  .formgrid{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>
<div id="authGate" class="authgate hidden"></div>
<div id="app">
  <header class="topbar"><div class="brand">THE FORGE<small>CAPABILITY MADE VISIBLE</small></div><div class="spacer"></div><span id="syncState" class="sync">LOCAL</span><button class="iconbtn" data-nav="account">⚙</button></header>
  <nav id="nav" class="nav"></nav>
  <main id="views"></main>
</div>
<div id="modalRoot"></div><div id="toast" class="toast hidden"></div>

<script data-forge-engine>
(function(root,factory){const api=factory();if(typeof module==='object'&&module.exports)module.exports=api;else root.ForgeEngine=api;})(typeof globalThis!=='undefined'?globalThis:this,function(){
'use strict';
const CONFIG={xpPerStage:100,oosMultiplier:.5,missPenaltyPerStage:50,sessionXpCeilingMult:30,firstBloodMult:1.5,heatLadder:[1,1.1,1.25,1.5,1.75,2],stalledDays:5,objActiveCap:5,objBonusPerStage:75,objAbandonPenalty:200,rockEconomy:true,rockMaxActive:4,rockPriorityXp:{1:1000,2:600,3:400,4:250},rockOnTimeBonus:{1:250,2:150,3:100,4:50},rockClockHours:{1:24,2:36,3:48,4:48},rockLatePct:.4,rockLateHardCap:200,rockSubStageCredit:25,rockSessionMomentumXp:15,rockNonRockAtomicXp:10,rockStreakPerDay:.05,rockStreakCap:.5,rockRecommitFee:100,rockRecommitMax:1,rockResetCooldownHours:24,tierXp:{1:150,2:100,3:60,4:35},rockBaseXp:100,rockCommitBonusPct:.5,rockMissDebit:50,dailyRockCap:5,campaignBonus:150};
const LADDER_VALUES=[5,5,10,15,25,40,50,75,100,150,200,300,500,750,1000];
const DAILY_PATTERN=[["F",0],["S",3],["T",10],["S",7],["T",25],["S",14],["T",50],["S",30],["T",100],["S",60],["T",150],["S",90],["T",250],["S",180],["T",300]];
const INTER_PATTERN=[["F",0],["2",2],["T",5],["W",3],["T",12],["W",6],["T",25],["W",10],["T",40],["W",16],["T",60],["W",24],["T",90],["W",40],["T",120]];
const DAILY_DOMS={body:1,work:1,university:1,mind:1,craft:1,faith:1};
const nowIso=()=>new Date().toISOString();
const dayKey=(d=new Date())=>{const x=new Date(d);return `${x.getFullYear()}-${String(x.getMonth()+1).padStart(2,'0')}-${String(x.getDate()).padStart(2,'0')}`};
const uid=(p='id')=>p+'_'+Math.random().toString(36).slice(2,9)+Date.now().toString(36);
function xpForLevel(L){return 500*Math.pow(Math.max(0,L-1),2)}
function levelFromXp(xp){return Math.max(1,Math.floor(Math.sqrt(Math.max(0,xp)/500))+1)}
function updateLevel(s){s.level=levelFromXp(s.cumulativeXp);return s.level}
function prestigeMult(s,domain){return 1+.5*Number((s.prestige||{})[domain]||0)}
function isRock(o){return false} /* retired: objectives are campaigns, rocks are daily task-flags */
function rockState(o,now=Date.now()){if(!isRock(o))return null;return new Date(o.deadline).getTime()<now?'overdue':'active'}
function activeRocks(s){return (s.objectives||[]).filter(isRock)}
function refreshRockClocks(s,now=Date.now()){activeRocks(s).forEach(o=>{if(rockState(o,now)==='overdue'&&!o.overdueAt)o.overdueAt=new Date(now).toISOString()})}
function sourceObjective(s,sourceId){const t=(s.tasks||[]).find(x=>x.id===sourceId||x.stages?.some(z=>z.id===sourceId));return t?(s.objectives||[]).find(o=>o.id===t.objectiveId):null}
function earnFrozenByGate(s,sourceType,sourceId,now=Date.now()){refreshRockClocks(s,now);if(!activeRocks(s).some(o=>rockState(o,now)==='overdue'))return false;if(sourceType==='rock')return false;const o=sourceObjective(s,sourceId);return !(o&&isRock(o))}
function postReceipt(s,{amount,type,sourceId,description,lifetimeXpChange}){const r={ts:nowIso(),amount:Number(amount)||0,type:type||'adjustment',sourceId:sourceId||'',description:description||'',lifetimeXpChange:Number(lifetimeXpChange)||0};s.xpTransactions.push(r);s.spendableXp+=r.amount;s.cumulativeXp+=r.lifetimeXpChange;s.dailyXp+=r.amount;updateLevel(s);return r}
function grantXp(s,amount,sourceType,sourceId,description,now=Date.now()){refreshRockClocks(s,now);amount=Math.round(Number(amount)||0);if(amount>0&&earnFrozenByGate(s,sourceType,sourceId,now))return {blocked:true,amount:0};if(amount>0)return {blocked:false,receipt:postReceipt(s,{amount,type:sourceType,sourceId,description,lifetimeXpChange:amount})};if(amount<0)return {blocked:false,receipt:postReceipt(s,{amount,type:sourceType,sourceId,description,lifetimeXpChange:0})};return {blocked:false,amount:0}}
function auditWallet(s){const cumulative=(s.xpTransactions||[]).reduce((a,r)=>a+(Number(r.lifetimeXpChange)||0),0);const spendable=(s.xpTransactions||[]).reduce((a,r)=>a+(Number(r.amount)||0),0);return {cumulative,spendable,cumulativeDrift:s.cumulativeXp-cumulative,spendableDrift:s.spendableXp-spendable,ok:cumulative===s.cumulativeXp&&spendable===s.spendableXp}}
function makeRock(s,id,p,now=Date.now()){const o=s.objectives.find(x=>x.id===id);if(!o||o.status!=='active')throw Error('Only active objectives can become rocks');p=Number(p);if(![1,2,3,4].includes(p))throw Error('Priority must be 1-4');if(activeRocks(s).length>=CONFIG.rockMaxActive&&!isRock(o))throw Error('Four active rocks maximum');if(activeRocks(s).some(x=>x.id!==id&&Number(x.priority)===p))throw Error(`P${p} is already occupied`);o.priority=p;o.deadline=new Date(now+CONFIG.rockClockHours[p]*3600000).toISOString();o.advanceXp=Number(o.advanceXp)||0;o.recommits=Number(o.recommits)||0;o.overdueAt=null;return o}
function unrock(s,id){const o=s.objectives.find(x=>x.id===id);if(!o)return;o.priority=null;o.deadline=null;o.advanceXp=0;o.recommits=0;o.overdueAt=null}
function streakMult(s){return 1+Math.min(CONFIG.rockStreakCap,(Number(s.consecutiveCleanDays)||0)*CONFIG.rockStreakPerDay)}
function tierValue(priority){const p=Number(priority);return CONFIG.tierXp[p]||0}
/* ============ DAILY ROCKS ============
   A rock is a task flagged as a today must-do. state.dailyRocks[dayKey] = [taskId,...] in
   display order. Rocks settle at day-end: landed rocks pay a commitment bonus on top of the
   work XP already earned, missed rocks cost the miss-debit and auto-roll to the next day.
   Landing every rock = a clean day = streak++. No clocks, no priority-distinctness. */
function dailyRockList(s,day=dayKey()){return (s.dailyRocks&&s.dailyRocks[day])?s.dailyRocks[day].slice():[]}
function isDailyRock(s,taskId,day=dayKey()){return dailyRockList(s,day).includes(taskId)}
function toggleDailyRock(s,taskId,day=dayKey()){if(!s.dailyRocks)s.dailyRocks={};const list=s.dailyRocks[day]||(s.dailyRocks[day]=[]);const i=list.indexOf(taskId);if(i>=0){list.splice(i,1);return false}if(list.length>=CONFIG.dailyRockCap)throw Error(`At most ${CONFIG.dailyRockCap} rocks a day — choose what actually wins the day`);list.push(taskId);return true}
function rockTaskDone(s,taskId){const t=(s.tasks||[]).find(x=>x.id===taskId);if(!t)return false;return t.stages&&t.stages.length?t.stages.every(z=>z.completed):!!t.completed}
function rockCommitBonus(s,t){const tierBase=tierValue(t&&t.priority)||CONFIG.rockBaseXp;return Math.round(tierBase*CONFIG.rockCommitBonusPct*streakMult(s))}
function dailyRocksAllLanded(s,day=dayKey()){const list=dailyRockList(s,day);return list.length>0&&list.every(id=>rockTaskDone(s,id))}
/* settle a day's rocks. Idempotent per day via s.rocksSettled[day]. */
function settleDailyRocks(s,day,now=Date.now()){
  if(!s.rocksSettled)s.rocksSettled={};
  if(s.rocksSettled[day])return {alreadySettled:true};
  const list=dailyRockList(s,day);if(!list.length){s.rocksSettled[day]=true;return {landed:0,missed:0,clean:false}}
  let landed=0,missed=0;const rollover=[];
  list.forEach(id=>{const t=(s.tasks||[]).find(x=>x.id===id);if(!t){return}
    if(rockTaskDone(s,id)){const bonus=rockCommitBonus(s,t);grantXp(s,bonus,'rock',id,`Rock landed: ${t.title}`,now);landed++;}
    else{grantXp(s,-CONFIG.rockMissDebit,'rock',id,`Rock missed: ${t.title}`,now);missed++;rollover.push(id);}
  });
  const clean=missed===0&&landed>0;
  if(clean)s.consecutiveCleanDays=(s.consecutiveCleanDays||0)+1;else if(missed>0)s.consecutiveCleanDays=0;
  s.rocksSettled[day]=true;
  /* auto-roll missed rocks onto the next calendar day's list (default on) */
  if(rollover.length){const d=new Date(day+'T12:00:00');d.setDate(d.getDate()+1);const nd=dayKey(d);if(!s.dailyRocks)s.dailyRocks={};const nl=s.dailyRocks[nd]||(s.dailyRocks[nd]=[]);rollover.forEach(id=>{if(!nl.includes(id)&&nl.length<CONFIG.dailyRockCap)nl.push(id)});}
  return {landed,missed,clean,rolled:rollover.length}
}

function avenueById(s,id){return (s.avenues||[]).find(a=>a.id===id)||null}
function avenuesInDomain(s,domainId){return (s.avenues||[]).filter(a=>a.domain===domainId&&!a.archived)}
function avenueDomain(s,id){const a=avenueById(s,id);return a?a.domain:null}
/* ============ TAPESTRY (manual, review-gated) ============
   state.tapestry[avenueId][dayKey] = {done:bool, note:str}. Nothing auto-fills — the user
   ticks a cell in the evening review as an earned judgment that the front moved the needle. */
function tapCell(s,av,day){return ((s.tapestry||{})[av]||{})[day]||null}
function tapToggle(s,av,day){if(!s.tapestry)s.tapestry={};if(!s.tapestry[av])s.tapestry[av]={};const c=s.tapestry[av][day];if(c&&c.done){if(c.note){c.done=false}else{delete s.tapestry[av][day]}}else{s.tapestry[av][day]={done:true,note:(c&&c.note)||''}}return tapCell(s,av,day)}
function tapNote(s,av,day,note){if(!s.tapestry)s.tapestry={};if(!s.tapestry[av])s.tapestry[av]={};const c=s.tapestry[av][day]||(s.tapestry[av][day]={done:false,note:''});c.note=note||'';if(!c.done&&!c.note)delete s.tapestry[av][day];return tapCell(s,av,day)}
function tapDayDone(s,day){const t=s.tapestry||{};return Object.keys(t).filter(av=>t[av][day]&&t[av][day].done).length}

/* ============ CAMPAIGN OBJECTIVES ============
   An objective has a cadence: 'once' (default), 'weekly', or 'daily', with a targetCount and
   periodProgress {periodKey:count}. Weekly/daily campaigns are progressed with logObjectiveProgress
   (a +1 each time you do the thing — 'gym 4x this week'). Hitting the target pays campaignBonus
   once per period. */
function weekKey(d=new Date()){const x=new Date(d);const day=(x.getDay()+6)%7;x.setDate(x.getDate()-day);x.setHours(0,0,0,0);return 'W'+dayKey(x)}
function periodKeyFor(cadence,d=new Date()){return cadence==='weekly'?weekKey(d):cadence==='daily'?dayKey(d):'once'}
function objectiveProgress(s,o,d=new Date()){if(!o||o.cadence==='once'||!o.cadence)return null;const pk=periodKeyFor(o.cadence,d);const count=((o.periodProgress||{})[pk])||0;const target=Number(o.targetCount)||1;return {periodKey:pk,count,target,hit:count>=target,pct:Math.min(100,Math.round(count/target*100))}}
function logObjectiveProgress(s,id,delta=1,now=Date.now()){const o=s.objectives.find(x=>x.id===id);if(!o)throw Error('No such objective');if(o.cadence!=='weekly'&&o.cadence!=='daily')throw Error('Only campaign objectives track progress');const pk=periodKeyFor(o.cadence,new Date(now));if(!o.periodProgress)o.periodProgress={};const before=o.periodProgress[pk]||0;const after=Math.max(0,before+delta);o.periodProgress[pk]=after;const target=Number(o.targetCount)||1;if(!o.paidPeriods)o.paidPeriods={};if(after>=target&&before<target&&!o.paidPeriods[pk]){grantXp(s,CONFIG.campaignBonus,'objective',o.id,`Campaign target hit: ${o.title} (${after}/${target})`,now);o.paidPeriods[pk]=true;}return objectiveProgress(s,o,new Date(now))}

function taskUnits(t){return t.stages?.length?t.stages.length:1}

function objectiveUnits(s,id){return (s.tasks||[]).filter(t=>t.objectiveId===id).reduce((n,t)=>n+taskUnits(t),0)}
function objectiveCompletedUnits(s,id){return (s.tasks||[]).filter(t=>t.objectiveId===id).reduce((n,t)=>n+taskCompletedUnits(t),0)}

function uniqueDays(actions){return [...new Set((actions||[]).map(a=>a.date))].sort()}
function maxConsecutiveDays(actions){const ds=uniqueDays(actions).map(x=>new Date(x+'T12:00:00').getTime());let best=0,run=0,prev=null;ds.forEach(t=>{run=prev!==null&&Math.round((t-prev)/86400000)===1?run+1:1;best=Math.max(best,run);prev=t});return best}

async function api(path,{method='GET',body,headers={}}={}){if(!cfg.url||!cfg.key)throw Error('Supabase is not configured');if(auth?.expires_at&&Date.now()>auth.expires_at-60000&&auth.refresh_token)await refreshAuth();const h={apikey:cfg.key,'Content-Type':'application/json',...headers};if(auth?.access_token)h.Authorization=`Bearer ${auth.access_token}`;const res=await fetch(cfg.url.replace(/\/$/,'')+path,{method,headers:h,body:body===undefined?undefined:JSON.stringify(body)});if(!res.ok){const text=await res.text();throw Error(text||`HTTP ${res.status}`)}const text=await res.text();return text?JSON.parse(text):null}

function renderRoster(){return state.roster.map(g=>`<div class="card"><div class="between"><div><h3>${esc(g.label)}</h3><span class="pill">${esc(domain(g.domain).nm)}</span></div><div class="row"><button class="btn small" data-add-chip="${g.id}">Add</button><button class="btn small" data-edit-roster="${g.id}">Edit</button></div></div><div class="roster">${g.chips.map(c=>{const done=(state.dailyLog[E.dayKey()]?.ticks||[]).includes(c.id);return`<button class="chip ${done?'done':''} ${c.t==='season'?'season':''} ${c.t==='flag'?'flag':''}" data-chip="${c.id}" data-group="${g.id}" title="Right-click to remove">${esc(c.n)}</button>`}).join('')}</div></div>`).join('')}
function openUnitRows(){const reserved=E.reservedStageIds(state);const rows=[];state.tasks.forEach(t=>{const o=state.objectives.find(x=>x.id===t.objectiveId);if(t.stages?.length)t.stages.forEach(z=>{if(!z.completed)rows.push({key:z.id,taskId:t.id,stageId:z.id,title:z.title,task:t,objective:o,reserved:reserved.has(z.id),atomic:false,waiting:z.waiting||t.waiting})});else if(!t.completed)rows.push({key:t.id,taskId:t.id,stageId:null,title:t.title,task:t,objective:o,reserved:reserved.has(t.id),atomic:true,waiting:t.waiting})});return rows}
function renderTasks(){const reserved=E.reservedStageIds(state);return `${hero()}<div class="between"><div class="section-title" style="flex:1"><h2>All tasks</h2><div class="rule"></div></div><div class="tabs-toggle"><button data-task-mode="list" class="${taskMode==='list'?'active':''}">List</button><button data-task-mode="tree" class="${taskMode==='tree'?'active':''}">Tree</button></div></div><div class="card"><h3>Add work</h3><div class="formgrid"><div class="field wide"><label>Task / slash-separated stages</label><input id="taskTitle" placeholder="Draft proposal / outline / evidence / final pass"></div><div class="field"><label>Domain</label><select id="taskDomain">${DOMAINS.map(d=>`<option value="${d.id}">${d.nm}</option>`).join('')}</select></div><div class="field"><label>Objective</label><select id="taskObjective"><option value="">None</option>${state.objectives.filter(o=>['active','backlog'].includes(o.status)).map(o=>`<option value="${o.id}">${esc(o.title)}</option>`).join('')}</select></div><div class="field"><label>Tier</label><select id="taskTier"><option value="">—</option><option value="1">P1</option><option value="2">P2</option><option value="3">P3</option><option value="4">P4</option></select></div><div class="field"><label>Due</label><input id="taskDue" type="date"></div><div class="field"><label>Repeat</label><select id="taskRecur"><option value="">None</option><option value="daily">Daily</option><option value="weekly">Weekly</option></select></div><div class="field"><label>Action</label><button id="addTask" class="btn primary">Add task</button></div></div></div>${taskMode==='list'?renderTaskList(reserved):renderTaskTree()}`}
function renderTaskList(reserved){let rows=openUnitRows();const allTags=[...new Set(state.tasks.flatMap(t=>t.tags||[]))].sort();const q=taskSearch.trim().toLowerCase();if(q)rows=rows.filter(r=>r.title.toLowerCase().includes(q)||(r.task.title||'').toLowerCase().includes(q));if(taskTag)rows=rows.filter(r=>(r.task.tags||[]).includes(taskTag));const unplanned=rows.filter(x=>!x.reserved),planned=rows.filter(x=>x.reserved);const controls=`<div class="card"><div class="formgrid"><div class="field wide"><label>Search</label><input id="taskSearch" value="${esc(taskSearch)}" placeholder="Filter by text…"></div><div class="field wide"><label>Tag</label><select id="taskTagSel"><option value="">All tags</option>${allTags.map(t=>`<option value="${esc(t)}" ${taskTag===t?'selected':''}>#${esc(t)}</option>`).join('')}</select></div></div></div>`;const section=(title,arr)=>`<div class="card"><div class="between"><h3>${title}</h3><span class="pill">${arr.length}</span></div>${arr.length?arr.map(r=>`<div class="item"><div class="check"><input type="checkbox" class="bulk-unit" value="${r.key}" ${r.reserved?'disabled':''}><div style="flex:1"><div class="between"><div><strong>${esc(r.title)}</strong><div class="item-meta">${esc(r.task.title)} · ${esc(r.objective?.title||'Unassigned')} ${r.task.dueDate?'· due '+r.task.dueDate:''}</div></div><div class="row">${r.objective&&E.isRock(r.objective)?`<span class="pill p${r.objective.priority}">P${r.objective.priority}</span>`:''}${r.waiting?'<span class="pill">WAITING</span>':''}${r.reserved?'<span class="pill">RESERVED</span>':`<button class="btn small" data-send-unit="${r.key}">→ session</button>`}<button class="btn good small" data-complete-unit="${r.key}">Done</button><button class="btn small" data-wait-unit="${r.key}">${r.waiting?'Unblock':'Wait'}</button></div></div></div></div></div>`).join(''):'<div class="muted">None.</div>'}</div>`;return `${controls}<div class="card"><div class="between"><strong>Bulk actions</strong><div class="row"><input id="bulkDue" type="date" style="width:auto"><button class="btn small" id="bulkSetDue">Set due</button><button class="btn small" id="bulkSession">Send to session</button><button class="btn danger small" id="bulkPurge">Purge</button></div></div></div>${section('Unplanned',unplanned)}${section('Planned / reserved',planned)}`}
function renderTaskTree(){return DOMAINS.map(d=>{const objs=state.objectives.filter(o=>o.domain===d.id&&['active','backlog'].includes(o.status));const loose=state.tasks.filter(t=>!t.objectiveId&&(t.domain||'')===d.id);if(!objs.length&&!loose.length)return'';return`<div class="card"><div class="domain-head">${esc(d.nm)} <span class="muted">// ${esc(d.sub)}</span></div>${objs.map(o=>{const pr=E.objectiveProgress(state,o);return`<details open><summary><div class="between"><strong>${esc(o.title)}</strong><div>${pr?`<span class="pill ${pr.hit?'done':''}">${pr.count}/${pr.target}</span>`:''}<span class="pill">${o.status}</span></div></div></summary><div class="tree-body">${state.tasks.filter(t=>t.objectiveId===o.id).map(renderTreeTask).join('')||'<div class="muted">No tasks.</div>'}</div></details>`}).join('')}${loose.length?`<div class="tree-body">${loose.map(renderTreeTask).join('')}</div>`:''}</div>`}).filter(Boolean).join('')}
function renderTreeTask(t){return`<div class="indent"><details open><summary><div class="between"><span>${t.completed?'✓ ':''}${esc(t.title)}</span><div class="row"><button class="btn small ghost" data-add-stage="${t.id}" title="Split into stages">+ stage</button><span class="pill">${E.taskCompletedUnits(t)}/${E.taskUnits(t)}</span></div></div></summary><div class="tree-body">${t.stages?.length?t.stages.map(z=>`<div class="item between"><span>${z.completed?'✓ ':''}${esc(z.title)}</span>${!z.completed?`<button class="btn small" data-send-unit="${z.id}">→ session</button>`:''}</div>`).join(''):`<div class="item between"><span>Atomic task</span>${!t.completed?`<button class="btn small" data-send-unit="${t.id}">→ session</button>`:''}</div>`}</div></details></div>`}
function renderObjectives(){const active=state.objectives.filter(o=>o.status==='active'),backlog=state.objectives.filter(o=>o.status==='backlog'),done=state.objectives.filter(o=>['complete','abandoned'].includes(o.status));return `${hero()}<div class="card"><h3>Create objective</h3><div class="formgrid"><div class="field wide"><label>Title</label><input id="objTitle" placeholder="Land the council automation offer"></div><div class="field"><label>Domain</label><select id="objDomain">${DOMAINS.map(d=>`<option value="${d.id}">${d.nm}</option>`).join('')}</select></div><div class="field"><label>Status</label><select id="objStatus"><option value="active">Active</option><option value="backlog">Backlog</option></select></div><div class="field"><label>Due date</label><input id="objDue" type="date"></div><div class="field"><label>Action</label><button id="addObjective" class="btn primary">Create</button></div></div></div>${objectiveSection('Active',active)}${objectiveSection('Backlog',backlog)}${objectiveSection('Completed / abandoned',done)}`}
function objectiveSection(title,arr){return`<div class="section-title"><h2>${title}</h2><div class="rule"></div><span class="pill">${arr.length}</span></div><div class="card">${arr.length?arr.map(o=>{const tasks=state.tasks.filter(t=>t.objectiveId===o.id),done=E.objectiveCompletedUnits(state,o.id),total=E.objectiveUnits(state,o.id);return`<div class="item"><div class="between"><div><div class="item-title">${esc(o.title)}</div><div class="item-meta">${esc(domain(o.domain).nm)} · ${done}/${total} units ${o.dueDate?'· due '+o.dueDate:''}</div></div><div class="row"><span class="pill ${o.status==='complete'?'done':''}">${o.status}</span></div></div>${['active','backlog'].includes(o.status)?`<div class="row" style="margin-top:9px">${o.status==='backlog'?`<button class="btn small" data-activate-obj="${o.id}">Activate</button>`:''}<button class="btn good small" data-complete-obj="${o.id}">Complete</button><button class="btn danger small" data-abandon-obj="${o.id}">Abandon</button><button class="btn ghost small" data-delete-obj="${o.id}">Delete</button></div>`:''}${tasks.length?`<div class="indent" style="margin-top:9px">${tasks.slice(0,5).map(t=>`<div class="item-meta">${t.completed?'✓':'○'} ${esc(t.title)}</div>`).join('')}${tasks.length>5?`<div class="item-meta">+${tasks.length-5} more</div>`:''}</div>`:''}</div>`}).join(''):'<div class="muted">None.</div>'}</div>`}
function renderSession(){if(state.currentSession){const ghost=state.currentSession.deviceId!==state.deviceId;return `${hero()}${ghost?renderGhostSession():renderRunningSession()}`}
const units=openUnitRows().filter(x=>!x.reserved);return `${hero()}<div class="card"><div class="between"><h2 class="serif">Build a focus window</h2><span class="pill">${builderSelected.size} selected</span></div><div class="formgrid"><div class="field"><label>Window</label><select id="sessionWindow">${[15,20,30,45,60,90,120].map(n=>`<option value="${n}" ${n===45?'selected':''}>${n} minutes</option>`).join('')}</select></div><div class="field wide"><label>Label</label><input id="sessionLabel" placeholder="One bounded attack"></div><div class="field"><label>Action</label><button id="startSession" class="btn primary">Start session</button></div><div class="field full"><label>Quick add (slashes become stages)</label><input id="sessionQuick" value="${esc(builderQuick)}" placeholder="New task / first stage / second stage"></div></div></div><div class="grid2"><div class="card"><div class="between"><h3>Available work</h3><span class="pill">reserved work hidden</span></div>${units.length?units.map(u=>`<label class="item check"><input type="checkbox" class="session-unit" value="${u.key}" ${builderSelected.has(u.key)?'checked':''}><span><strong>${esc(u.title)}</strong><span class="item-meta">${esc(u.objective?.title||'Unassigned')} ${u.objective&&E.isRock(u.objective)?'· P'+u.objective.priority:''}</span></span></label>`).join(''):'<div class="muted">No open work.</div>'}</div><div>${renderPlans()}${renderSchedulerControls()}${renderTimeline()}</div></div>`}
function renderGhostSession(){const s=state.currentSession;return`<div class="card"><span class="pill overdue">SESSION FROM ANOTHER DEVICE</span><h2 class="serif">${esc(s.label||'Focus session')}</h2><p class="muted">Keep completed ticks and heat, then bind the timer here. An expired or cross-day clock will restart at the original full window.</p><div class="row"><button class="btn primary" id="takeOverSession">Take Over Here</button><button class="btn danger" id="discardSession">Discard</button></div></div>`}
function renderRunningSession(){const s=state.currentSession,done=s.items.filter(i=>i.done).length;return`<div class="card"><div class="between"><div><span class="pill">LIVE WINDOW</span><h2 class="serif">${esc(s.label||'Focus session')}</h2></div><span class="pill">${done}/${s.items.length}</span></div><div class="timer" id="timerDisplay">--:--</div><div class="heat">HEAT ×${E.CONFIG.heatLadder[Math.min(E.CONFIG.heatLadder.length-1,done.length||done)]||1} · FIRST BLOOD ${s.firstBlood?'ON':'OFF'} · MYSTERY ×${s.mysteryMult||1}</div><div class="stack" style="margin-top:18px">${s.items.map((i,n)=>`<div class="item between"><div class="check"><input type="checkbox" data-session-tick="${n}" ${i.done?'checked':''}><div><strong>${esc(i.title)}</strong><div class="item-meta">${i.waiting?'waiting · still in commitment denominator':'committed'}</div></div></div><div class="row"><button class="btn small ghost" data-session-split="${n}">+ split</button><button class="btn small" data-session-wait="${n}">${i.waiting?'Unblock':'Waiting'}</button></div></div>`).join('')}</div><div class="row" style="margin-top:14px"><button class="btn good" id="finishSession">Reconcile & bank</button></div></div>`}
function renderPlans(){const now=Date.now();return`<div class="card"><div class="between"><h3>Planned sessions</h3><button class="btn small" id="newPlan">New plan</button></div>${state.planned.length?state.planned.slice().sort((a,b)=>(a.date+a.start).localeCompare(b.date+b.start)).map(p=>{const st=E.planStatus(p,now);return`<div class="item"><div class="between"><div><strong>${esc(p.label||'Planned session')}</strong><div class="item-meta">${p.date} ${p.start} · ${p.window}m · ${p.stages.length} units</div></div><span class="pill ${st==='missed'?'overdue':''}">${st}</span></div><div class="row" style="margin-top:7px">${['ready','upcoming'].includes(st)?`<button class="btn small" data-launch-plan="${p.id}">Launch</button><button class="btn small ghost" data-plan-nudge="${p.id}" data-d="-15" title="Earlier 15m">−15</button><button class="btn small ghost" data-plan-nudge="${p.id}" data-d="15" title="Later 15m">+15</button><button class="btn small ghost" data-plan-len="${p.id}" data-d="-15" title="Shorter">−len</button><button class="btn small ghost" data-plan-len="${p.id}" data-d="15" title="Longer">+len</button><button class="btn small" data-edit-plan="${p.id}">Edit</button>`:''}<button class="btn danger small" data-delete-plan="${p.id}">Delete</button></div></div>`}).join(''):'<div class="muted">No plans.</div>'}</div>`}
function renderSchedulerControls(){return`<div class="card"><h3>Add calendar commitment</h3><div class="formgrid"><div class="field wide"><label>Type</label><input id="eventType" placeholder="Client call"></div><div class="field"><label>Date</label><input id="eventDate" type="date" value="${E.dayKey()}"></div><div class="field"><label>Start</label><input id="eventStart" type="time"></div><div class="field"><label>End</label><input id="eventEnd" type="time"></div><div class="field"><label>Action</label><button class="btn" id="addEvent">Add event</button></div></div></div>`}
function renderTimeline(){const date=E.dayKey(),events=state.events.filter(e=>e.date===date),start=6,end=22,span=end-start;let lines='';for(let h=start;h<=end;h+=2){const l=(h-start)/span*100;lines+=`<div class="gridline" style="left:${l}%"></div><div class="gridlabel" style="left:${l}%">${String(h).padStart(2,'0')}</div>`}const blocks=events.map(ev=>{const mins=x=>{const[a,b]=x.split(':').map(Number);return a+b/60},l=(mins(ev.start)-start)/span*100,w=(mins(ev.end)-mins(ev.start))/span*100;return`<div class="event-block" style="left:${Math.max(0,l)}%;width:${Math.max(1,w)}%" title="${esc(ev.type)}"><span>${esc(ev.type)}</span></div>`}).join('');const n=new Date(),nh=n.getHours()+n.getMinutes()/60,nl=(nh-start)/span*100;return`<div class="card"><div class="between"><h3>Today’s timeline</h3><span class="pill">06–22</span></div><div class="timeline">${lines}${blocks}${nl>=0&&nl<=100?`<div class="nowline" style="left:${nl}%"></div>`:''}</div></div>`}
function allBooks(){return [...SEED_BOOKS.filter(b=>!state.reading.removed.includes(b.id)),...state.reading.custom]}
function renderReading(){const books=allBooks(),read=books.filter(b=>(state.reading.status[b.id]||'unread')==='read').length,reading=books.filter(b=>state.reading.status[b.id]==='reading').length;return `${hero()}<div class="hero"><div class="metric"><div class="label">Canon read</div><div class="value">${read}/${books.length}</div></div><div class="metric"><div class="label">In progress</div><div class="value">${reading}</div></div><div class="metric"><div class="label">Reading XP</div><div class="value">5</div><div class="sub">per logged session</div></div><div class="metric"><div class="label">Finish XP</div><div class="value">25</div><div class="sub">per book</div></div></div><div class="card"><h3>Add a book</h3><div class="formgrid"><div class="field wide"><label>Title</label><input id="bookTitle"></div><div class="field"><label>Author</label><input id="bookAuthor"></div><div class="field"><label>Section</label><select id="bookSection">${SECTIONS.map(s=>`<option>${esc(s)}</option>`).join('')}</select></div><div class="field"><label>Domain</label><select id="bookDomain"><option value="mind">Mind</option><option value="faith">Faith</option></select></div><div class="field"><label>Action</label><button id="addBook" class="btn primary">Add book</button></div></div></div>${SECTIONS.map(sec=>{const list=books.filter(b=>b.s===sec);if(!list.length)return'';return`<div class="card"><div class="between"><h3>${esc(sec)}</h3><span class="pill">${list.filter(b=>state.reading.status[b.id]==='read').length}/${list.length}</span></div>${list.map(renderBook).join('')}</div>`}).join('')}`}
function renderBook(b){const st=state.reading.status[b.id]||'unread',dom=b.domain||((b.s==='The Contemplative Spine')?'faith':'mind');return`<div class="book"><button class="statusbtn ${st}" data-book-status="${b.id}">${st}</button><div><strong>${esc(b.t)}</strong><div class="item-meta">${esc(b.a)} · ${esc(dom)}</div><textarea data-book-notes="${b.id}" placeholder="Reading notes">${esc(state.reading.notes[b.id]||'')}</textarea></div><div class="book-actions stack"><button class="btn small" data-read-log="${b.id}">Log 5 XP</button><button class="btn danger small" data-remove-book="${b.id}">Remove</button></div></div>`}
function renderTapestry(){const today=E.dayKey();const settled=(state.rocksSettled||{})[today];
  // --- evening review scoreboard ---
  const rocks=E.dailyRockList(state,today),landed=rocks.filter(id=>E.rockTaskDone(state,id)).length;
  const camps=state.objectives.filter(o=>o.status==='active'&&(o.cadence==='weekly'||o.cadence==='daily'));
  const score=`<div class="row" style="gap:16px;margin-bottom:12px"><div><div class="metric" style="min-height:auto;padding:11px"><div class="label">Today's rocks</div><div class="value" style="font-size:22px">${landed}/${rocks.length||0}</div></div></div><div><div class="metric" style="min-height:auto;padding:11px"><div class="label">XP today</div><div class="value" style="font-size:22px">${fmt(state.dailyXp||0)}</div></div></div><div><div class="metric" style="min-height:auto;padding:11px"><div class="label">Clean streak</div><div class="value" style="font-size:22px">${state.consecutiveCleanDays||0}</div></div></div></div>`;
  // --- per-avenue tick for today, grouped by domain ---
  const tickRows=DOMAINS.map(d=>{const avs=(state.avenues||[]).filter(a=>a.domain===d.id&&!a.archived);if(!avs.length)return'';return `<div style="margin-top:8px"><div class="item-meta" style="color:var(--brass);text-transform:uppercase;letter-spacing:.08em">${esc(d.nm)}</div>${avs.map(a=>{const c=E.tapCell(state,a.id,today);const on=c&&c.done;return `<div class="between" style="padding:6px 0;border-bottom:1px solid var(--line)"><button class="chip ${on?'done':''}" data-tap-toggle="${a.id}" style="flex:1;margin-right:8px">${on?'✓ ':''}${esc(a.name)}</button><button class="btn small ghost" data-tap-note="${a.id}" title="Note">${c&&c.note?'✎*':'✎'}</button></div>`}).join('')}</div>`}).filter(Boolean).join('');
  const review=`<div class="card"><div class="section-title" style="margin-top:0"><h2>Evening review</h2><div class="rule"></div><span class="pill">${today}</span></div><div class="item-meta" style="margin-bottom:10px">Review the day, then tick the fronts that actually moved the needle. Green is an earned judgment, not activity.</div>${score}${settled?'<div class="pill done" style="margin-bottom:10px">Day settled ✓</div>':`<button class="btn good" id="settleRocks" style="margin-bottom:12px">Settle the day (pay rocks, judge streak)</button>`}<div class="section-title"><h2 style="font-size:15px">Did each front move the needle today?</h2><div class="rule"></div></div>${tickRows||'<div class="muted">No avenues yet.</div>'}<div class="section-title"><h2 style="font-size:15px">Command journal</h2><div class="rule"></div></div><div class="field"><textarea id="reviewJournal" placeholder="A line for the log — a win, a lesson, a thought…"></textarea></div><button class="btn" id="reviewJournalPost" style="margin-top:8px">Post entry</button></div>`;
  // --- the grid: avenues x days, rolling window ---
  const WIN=56;const days=[];const base=new Date(today+'T12:00:00');for(let i=WIN-1;i>=0;i--){const dd=new Date(base);dd.setDate(dd.getDate()-i);days.push(E.dayKey(dd))}
  const monthLbl=days.map((dk,i)=>{const dt=new Date(dk+'T12:00:00');const first=i===0||dt.getDate()<=1||new Date(days[i-1]+'T12:00:00').getMonth()!==dt.getMonth();return first?`<td class="tap-m" style="font:9px var(--mono);color:var(--muted);padding:0 2px">${dt.toLocaleDateString('en',{month:'short'})}</td>`:'<td></td>'}).join('');
  const gridRows=DOMAINS.map(d=>{const avs=(state.avenues||[]).filter(a=>a.domain===d.id&&!a.archived);if(!avs.length)return'';return `<tr><td colspan="${days.length+1}" style="font:700 10px var(--mono);color:var(--brass);text-transform:uppercase;letter-spacing:.08em;padding:8px 0 3px">${esc(d.nm)}</td></tr>`+avs.map(a=>`<tr><td class="tap-name" style="position:sticky;left:0;background:var(--card);white-space:nowrap;padding-right:8px;font-size:12px;z-index:2">${esc(a.name)}</td>${days.map(dk=>{const c=E.tapCell(state,a.id,dk);const on=c&&c.done;const note=c&&c.note;const isToday=dk===today;return `<td style="padding:1px"><button data-tap-toggle="${a.id}" data-tap-day="${dk}" title="${dk}${note?' · '+esc(note):''}" style="width:14px;height:14px;border-radius:2px;padding:0;border:1px solid ${isToday?'var(--gold)':'var(--line2)'};background:${on?'var(--brass)':'transparent'};position:relative">${note?'<span style=\'position:absolute;top:-2px;right:-2px;width:5px;height:5px;border-radius:50%;background:var(--oxide)\'></span>':''}</button></td>`}).join('')}</tr>`).join('')}).filter(Boolean).join('');

  $('#addReward')?.addEventListener('click',()=>mutate(()=>{const name=$('#rewardName').value.trim(),aud=Number($('#rewardAud').value||0),override=Number($('#rewardXp').value||0);if(!name)throw Error('Reward name required');const costXp=override||Math.round(aud*state.rewardSettings.xpPerDollar);if(costXp<=0)throw Error('Reward needs a positive XP cost');state.rewardCatalogue.push({id:E.uid('reward'),name,aud,costXp})},'Reward added'));
  $$('[data-reward-setting]').forEach(i=>i.onchange=()=>mutate(()=>{state.rewardSettings[i.dataset.rewardSetting]=Number(i.value)}));
  $$('[data-buy-reward]').forEach(b=>b.onclick=()=>mutate(()=>{const r=state.rewardCatalogue.find(x=>x.id===b.dataset.buyReward);if(state.spendableXp<r.costXp)throw Error('Insufficient spendable XP');if(r.aud&&monthRewardSpend()+r.aud>state.rewardSettings.monthlyAllowanceCapAud)throw Error('Monthly real-money allowance cap reached');E.grantXp(state,-r.costXp,'reward',r.id,`Purchased reward: ${r.name}`);const inv={id:E.uid('inventory'),rewardId:r.id,name:r.name,aud:r.aud,costXp:r.costXp,purchasedAt:new Date().toISOString()};state.rewardInventory.push(inv);state.rewardRedemptions.push({id:E.uid('rewardlog'),type:'purchase',inventoryId:inv.id,name:r.name,aud:r.aud,ts:inv.purchasedAt})},'Reward purchased'));
  $$('[data-delete-reward]').forEach(b=>b.onclick=()=>mutate(()=>{state.rewardCatalogue=state.rewardCatalogue.filter(x=>x.id!==b.dataset.deleteReward)},'Reward deleted'));
  $$('[data-redeem-reward]').forEach(b=>b.onclick=()=>mutate(()=>{const i=state.rewardInventory.find(x=>x.id===b.dataset.redeemReward);state.rewardInventory=state.rewardInventory.filter(x=>x.id!==i.id);state.rewardRedemptions.push({id:E.uid('redeem'),type:'redeem',inventoryId:i.id,name:i.name,aud:i.aud,ts:new Date().toISOString()})},'Reward redeemed'));
  $$('[data-refund-reward]').forEach(b=>b.onclick=()=>mutate(()=>{const i=state.rewardInventory.find(x=>x.id===b.dataset.refundReward),refund=Math.round(i.costXp*state.rewardSettings.rewardRefundRate);E.postReceipt(state,{amount:refund,type:'reward_refund',sourceId:i.id,description:`Reward returned: ${i.name}`,lifetimeXpChange:0});state.rewardInventory=state.rewardInventory.filter(x=>x.id!==i.id);state.rewardRedemptions.push({id:E.uid('refund'),type:'refund',inventoryId:i.id,name:i.name,aud:-Number(i.aud||0),ts:new Date().toISOString()})},'Reward returned'));
  $('#reconcileWallet')?.addEventListener('click',()=>mutate(()=>{const a=E.auditWallet(state);state.xpTransactions.push({ts:new Date().toISOString(),amount:a.spendableDrift,type:'audit_correction',sourceId:'ledger',description:'Spendable ledger correction',lifetimeXpChange:a.cumulativeDrift})},'Ledger reconciled'));
  $('#refreshExport')?.addEventListener('click',()=>render());$('#copyExport')?.addEventListener('click',()=>navigator.clipboard.writeText($('#exportText').value).then(()=>toast('Export copied')));$('#downloadExport')?.addEventListener('click',()=>{const blob=new Blob([$('#exportText').value],{type:'text/plain'}),a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`the-forge-export-${E.dayKey()}.txt`;a.click();URL.revokeObjectURL(a.href)});
  $('#saveSupabase')?.addEventListener('click',()=>{cfg={url:$('#sbUrl').value.trim().replace(/\/$/,''),key:$('#sbKey').value.trim()};localStorage.setItem(CFG_LS,JSON.stringify(cfg));toast('Connection saved')});
  $('#signIn')?.addEventListener('click',()=>signIn($('#authEmail').value.trim(),$('#authPassword').value).catch(e=>toast(e.message)));$('#signUp')?.addEventListener('click',()=>signUp($('#authEmail').value.trim(),$('#authPassword').value).catch(e=>toast(e.message)));$('#signOut')?.addEventListener('click',signOut);$('#pullState')?.addEventListener('click',()=>pullRemoteState().then(render));$('#pushState')?.addEventListener('click',pushRemoteState);$('#copySql')?.addEventListener('click',()=>navigator.clipboard.writeText(SQL_SCHEMA).then(()=>toast('SQL copied')));
  $('#weeklyRockTarget')?.addEventListener('change',e=>mutate(()=>state.weeklyRockTarget=Math.max(1,Number(e.target.value)||3)));$('#quoteFilter')?.addEventListener('change',e=>mutate(()=>{state.quotes.filter=e.target.value;quoteOnLoad=chooseQuote()}));
  $('#addQuote')?.addEventListener('click',()=>{const text=prompt('Quote text');if(!text)return;const who=prompt('Attribution','Custom')||'Custom',fuel=prompt('Fuel: clean or dirty','clean');mutate(()=>state.quotes.custom.push({text:text.trim(),who:who.trim(),fuel:fuel==='dirty'?'dirty':'clean'}),'Quote added')});
  $$('[data-edit-quote]').forEach(b=>b.onclick=()=>{const q=state.quotes.custom[Number(b.dataset.editQuote)],text=prompt('Quote text',q.text);if(text===null)return;const who=prompt('Attribution',q.who);if(who===null)return;const fuel=prompt('Fuel: clean or dirty',q.fuel);mutate(()=>{q.text=text.trim();q.who=who.trim();q.fuel=fuel==='dirty'?'dirty':'clean'},'Quote updated')});
  $$('[data-delete-quote]').forEach(b=>b.onclick=()=>{if(confirm('Delete this custom quote?'))mutate(()=>state.quotes.custom.splice(Number(b.dataset.deleteQuote),1),'Quote deleted')});
  $('#armReset')?.addEventListener('click',()=>{if(confirm('Arm the 24-hour character reset cooldown?'))mutate(()=>E.armReset(state),'Reset armed')});$('#standDownReset')?.addEventListener('click',()=>mutate(()=>state.resetRequestedAt=null,'Reset stood down'));$('#executeReset')?.addEventListener('click',()=>{if(confirm('This wipes all XP progression. Continue?'))mutate(()=>E.executeReset(state,$('#resetPhrase').value),'Character reset')});
  $('#restoreState')?.addEventListener('click',()=>{if(!confirm('Replace the current state with this backup?'))return;try{const raw=JSON.parse($('#restoreJson').value);state=migrate(raw);saveState();render();toast('State restored')}catch(e){toast('Invalid JSON backup')}});
  $('#runTests')?.addEventListener('click',runBrowserTests);
}
function testState(){const s=blankState();s.roster=[];s.objectives=[];s.tasks=[];s.xpTransactions=[];s.cumulativeXp=s.spendableXp=s.dailyXp=0;return s}
function runIntegrityTests(){const out=[],test=(name,fn)=>{try{fn();out.push({name,ok:true})}catch(e){out.push({name,ok:false,error:e.message})}},eq=(a,b,m='')=>{if(a!==b)throw Error(`${m} expected ${b}, got ${a}`)},ok=(v,m='assertion failed')=>{if(!v)throw Error(m)};
  test('Quadratic level curve',()=>{eq(E.xpForLevel(1),0);eq(E.xpForLevel(2),500);eq(E.xpForLevel(3),2000);eq(E.levelFromXp(1999),2);eq(E.levelFromXp(2000),3)});
  test('Dual wallet earns and penalties preserve lifetime',()=>{const s=testState();E.grantXp(s,100,'test','a','earn');E.grantXp(s,-40,'test','b','penalty');eq(s.cumulativeXp,100);eq(s.spendableXp,60);eq(s.xpTransactions.length,2)});
  test('Ledger recomputes cleanly',()=>{const s=testState();E.grantXp(s,100,'test','a','earn');E.grantXp(s,-40,'test','b','penalty');ok(E.auditWallet(s).ok)});
  test('Daily rock flag, cap and done-detection',()=>{const s=testState();s.tasks.push({id:'t1',title:'A',stages:[],completed:true},{id:'t2',title:'B',stages:[{id:'x',completed:false}]});const D=E.dayKey();E.toggleDailyRock(s,'t1',D);E.toggleDailyRock(s,'t2',D);ok(E.isDailyRock(s,'t1',D));ok(E.rockTaskDone(s,'t1'));ok(!E.rockTaskDone(s,'t2'));E.toggleDailyRock(s,'t1',D);ok(!E.isDailyRock(s,'t1',D))});
  test('Rock cap refuses a sixth',()=>{const s=testState();const D=E.dayKey();for(let i=0;i<5;i++){s.tasks.push({id:'r'+i,title:'r'+i,stages:[]});E.toggleDailyRock(s,'r'+i,D)}s.tasks.push({id:'r6',title:'r6',stages:[]});let threw=false;try{E.toggleDailyRock(s,'r6',D)}catch{threw=true}ok(threw)});
  test('Settlement: all landed pays commit bonus and makes a clean day',()=>{const s=testState();const D='2026-07-20';s.currentDate=D;s.tasks.push({id:'t1',title:'A',priority:1,stages:[],completed:true},{id:'t2',title:'B',priority:3,stages:[],completed:true});E.toggleDailyRock(s,'t1',D);E.toggleDailyRock(s,'t2',D);const before=s.spendableXp;const r=E.settleDailyRocks(s,D);eq(r.landed,2);eq(r.missed,0);ok(r.clean);eq(s.consecutiveCleanDays,1);eq(s.spendableXp-before,75+30);ok(E.settleDailyRocks(s,D).alreadySettled)});
  test('Settlement: a miss debits, breaks streak, and auto-rolls to tomorrow',()=>{const s=testState();const D='2026-07-20';s.currentDate=D;s.consecutiveCleanDays=5;s.tasks.push({id:'t2',title:'missed',stages:[],completed:false});E.toggleDailyRock(s,'t2',D);const before=s.spendableXp;E.settleDailyRocks(s,D);eq(before-s.spendableXp,E.CONFIG.rockMissDebit);eq(s.consecutiveCleanDays,0);ok(E.dailyRockList(s,'2026-07-21').includes('t2'))});
  test('Streak multiplier caps at 1.5',()=>{const s=testState();s.consecutiveCleanDays=4;eq(E.streakMult(s),1.2);s.consecutiveCleanDays=50;eq(E.streakMult(s),1.5)});
  test('Campaign objective pays target bonus once per period',()=>{const s=testState();s.objectives.push({id:'o1',title:'Book 4',avenueId:'a',domain:'work',status:'active',cadence:'weekly',targetCount:4,periodProgress:{},paidPeriods:{}});const before=s.spendableXp;E.logObjectiveProgress(s,'o1',1);E.logObjectiveProgress(s,'o1',1);E.logObjectiveProgress(s,'o1',1);const pr=E.logObjectiveProgress(s,'o1',1);ok(pr.hit);eq(s.spendableXp-before,E.CONFIG.campaignBonus);const after=s.spendableXp;E.logObjectiveProgress(s,'o1',1);eq(s.spendableXp,after)});
  test('Objective manual completion pays completed units only',()=>{const s=testState();s.objectives.push({id:'o',title:'O',status:'active'});s.tasks.push({id:'t',objectiveId:'o',stages:[{completed:true},{completed:false}]});const r=E.completeObjective(s,'o',true);eq(r.payout,75)});
  test('Delete is free; abandon costs spendable only',()=>{const s=testState();E.grantXp(s,500,'test','a','seed');s.objectives.push({id:'d',status:'active',title:'D'},{id:'a',status:'active',title:'A'});E.deleteObjective(s,'d');eq(s.spendableXp,500);E.abandonObjective(s,'a');eq(s.spendableXp,300);eq(s.cumulativeXp,500)});
  test('Session reconciliation can net negative with invariant denominator',()=>{const s=testState();s.tasks.push({id:'t',objectiveId:null,stages:[{id:'a'},{id:'b'}]});const session={id:'s',items:[{taskId:'t',stageId:'a',title:'A',done:true},{taskId:'t',stageId:'b',title:'B',done:false}],firstBlood:false,mysteryMult:1,weekend:false};const r=E.scoreSession(s,session);eq(r.committed,2);eq(r.missed,1);eq(r.earned,28);eq(r.penalty,50);eq(r.net,-22)});
  test('Reservations release on launch, miss and delete',()=>{const s=testState(),now=Date.now();s.planned=[{id:'p',date:E.dayKey(now),start:'23:59',window:30,stages:['x']}];ok(E.reservedStageIds(s,now).has('x'));s.planned[0].launchedAt=new Date().toISOString();ok(!E.reservedStageIds(s,now).has('x'));delete s.planned[0].launchedAt;s.planned[0].date='2000-01-01';ok(!E.reservedStageIds(s,now).has('x'));s.planned=[];ok(!E.reservedStageIds(s,now).has('x'))});
  test('Ladder triggers F, streak and totals',()=>{const s=testState();s.ladderState.body={unlocked:[],actions:[]};E.recordDomainAction(s,'body','a','2026-01-01',TITLES.body);ok(s.ladderState.body.unlocked.includes(0));E.recordDomainAction(s,'body','b','2026-01-02',TITLES.body);E.recordDomainAction(s,'body','c','2026-01-03',TITLES.body);ok(s.ladderState.body.unlocked.includes(1));for(let i=4;i<=10;i++)E.recordDomainAction(s,'body','x'+i,`2026-01-${String(i).padStart(2,'0')}`,TITLES.body);ok(s.ladderState.body.unlocked.includes(2))});
  test('Reset requires cooldown and typed phrase, then zeros streak',()=>{const s=testState(),now=Date.now();s.cumulativeXp=s.spendableXp=100;s.consecutiveCleanDays=9;E.armReset(s,now);let threw=false;try{E.executeReset(s,'RESET',now+23*3600000)}catch{threw=true}ok(threw);E.executeReset(s,'RESET',now+25*3600000);eq(s.cumulativeXp,0);eq(s.consecutiveCleanDays,0)});
  return out;
}
function runBrowserTests(){const results=runIntegrityTests(),el=$('#testResults');el.innerHTML=`<div class="item" style="margin-top:12px"><strong>${results.filter(x=>x.ok).length}/${results.length} passed</strong>${results.map(r=>`<div class="${r.ok?'test-pass':'test-fail'} mono" style="margin-top:5px">${r.ok?'PASS':'FAIL'} · ${esc(r.name)}${r.error?' · '+esc(r.error):''}</div>`).join('')}</div>`}
render();if(auth&&cfg.url&&cfg.key){pullRemoteState().then(()=>{render();syncJournal()})}else setSync(navigator.onLine?'local':'offline');
window.ForgeApp={getState:()=>state,runTests:runIntegrityTests,export:buildExport};
})();
</script>
