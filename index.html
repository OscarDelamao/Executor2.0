<script data-forge-engine>
(function(root,factory){const api=factory();if(typeof module==='object'&&module.exports)module.exports=api;else root.ForgeEngine=api;})(typeof globalThis!=='undefined'?globalThis:this,function(){

const nowIso=()=>new Date().toISOString();
const dayKey=(d=new Date())=>{const x=new Date(d);return `${x.getFullYear()}-${String(x.getMonth()+1).padStart(2,'0')}-${String(x.getDate()).padStart(2,'0')}`};

function xpForLevel(L){return 500*Math.pow(Math.max(0,L-1),2)}
function levelFromXp(xp){return Math.max(1,Math.floor(Math.sqrt(Math.max(0,xp)/500))+1)}

function prestigeMult(s,domain){return 1+.5*Number((s.prestige||{})[domain]||0)}
function isRock(o){return !!o&&o.status==='active'&&!!o.priority}

function sourceObjective(s,sourceId){const t=(s.tasks||[]).find(x=>x.id===sourceId||x.stages?.some(z=>z.id===sourceId));return t?(s.objectives||[]).find(o=>o.id===t.objectiveId):null}

function postReceipt(s,{amount,type,sourceId,description,lifetimeXpChange}){const r={ts:nowIso(),amount:Number(amount)||0,type:type||'adjustment',sourceId:sourceId||'',description:description||'',lifetimeXpChange:Number(lifetimeXpChange)||0};s.xpTransactions.push(r);s.spendableXp+=r.amount;s.cumulativeXp+=r.lifetimeXpChange;s.dailyXp+=r.amount;updateLevel(s);return r}
function grantXp(s,amount,sourceType,sourceId,description,now=Date.now()){refreshRockClocks(s,now);amount=Math.round(Number(amount)||0);if(amount>0&&earnFrozenByGate(s,sourceType,sourceId,now))return {blocked:true,amount:0};if(amount>0)return {blocked:false,receipt:postReceipt(s,{amount,type:sourceType,sourceId,description,lifetimeXpChange:amount})};if(amount<0)return {blocked:false,receipt:postReceipt(s,{amount,type:sourceType,sourceId,description,lifetimeXpChange:0})};return {blocked:false,amount:0}}
function auditWallet(s){const cumulative=(s.xpTransactions||[]).reduce((a,r)=>a+(Number(r.lifetimeXpChange)||0),0);const spendable=(s.xpTransactions||[]).reduce((a,r)=>a+(Number(r.amount)||0),0);return {cumulative,spendable,cumulativeDrift:s.cumulativeXp-cumulative,spendableDrift:s.spendableXp-spendable,ok:cumulative===s.cumulativeXp&&spendable===s.spendableXp}}
function makeRock(s,id,p,now=Date.now()){const o=s.objectives.find(x=>x.id===id);if(!o||o.status!=='active')throw Error('Only active objectives can become rocks');p=Number(p);if(![1,2,3,4].includes(p))throw Error('Priority must be 1-4');if(activeRocks(s).length>=CONFIG.rockMaxActive&&!isRock(o))throw Error('Four active rocks maximum');if(activeRocks(s).some(x=>x.id!==id&&Number(x.priority)===p))throw Error(`P${p} is already occupied`);o.priority=p;o.deadline=new Date(now+CONFIG.rockClockHours[p]*3600000).toISOString();o.advanceXp=Number(o.advanceXp)||0;o.recommits=Number(o.recommits)||0;o.overdueAt=null;return o}
function unrock(s,id){const o=s.objectives.find(x=>x.id===id);if(!o)return;o.priority=null;o.deadline=null;o.advanceXp=0;o.recommits=0;o.overdueAt=null}
function streakMult(s){return 1+Math.min(CONFIG.rockStreakCap,(Number(s.consecutiveCleanDays)||0)*CONFIG.rockStreakPerDay)}

function recommitRock(s,id,now=Date.now()){const o=s.objectives.find(x=>x.id===id);if(!isRock(o)||rockState(o,now)!=='overdue')throw Error('Only overdue rocks can be recommitted');if((o.recommits||0)>=CONFIG.rockRecommitMax)throw Error('Recommit already used');grantXp(s,-CONFIG.rockRecommitFee,'rock',o.id,`Recommit fee: ${o.title}`,now);o.recommits=(o.recommits||0)+1;o.deadline=new Date(now+CONFIG.rockClockHours[o.priority]*3600000).toISOString();o.overdueAt=null;s.consecutiveCleanDays=0;return o}
function abandonRock(s,id,now=Date.now()){const o=s.objectives.find(x=>x.id===id);if(!isRock(o))throw Error('Not a live rock');o.status='abandoned';o.abandonedAt=new Date(now).toISOString();s.consecutiveCleanDays=0;(s.tasks||[]).filter(t=>t.objectiveId===id).forEach(t=>t.objectiveId=null);return o}
function evaluateCleanDay(s,now=Date.now()){refreshRockClocks(s,now);if(activeRocks(s).some(o=>rockState(o,now)==='overdue'))s.consecutiveCleanDays=0;else s.consecutiveCleanDays=(s.consecutiveCleanDays||0)+1;return s.consecutiveCleanDays}
function taskUnits(t){return t.stages?.length?t.stages.length:1}
function taskCompletedUnits(t){return t.stages?.length?t.stages.filter(x=>x.completed).length:(t.completed?1:0)}
function objectiveUnits(s,id){return (s.tasks||[]).filter(t=>t.objectiveId===id).reduce((n,t)=>n+taskUnits(t),0)}
function objectiveCompletedUnits(s,id){return (s.tasks||[]).filter(t=>t.objectiveId===id).reduce((n,t)=>n+taskCompletedUnits(t),0)}
function completeObjective(s,id,manual=false,now=Date.now()){const o=s.objectives.find(x=>x.id===id);if(!o||!['active','backlog'].includes(o.status))throw Error('Objective not completable');if(isRock(o))return landRock(s,id,now);const units=manual?objectiveCompletedUnits(s,id):objectiveUnits(s,id);const xp=units*CONFIG.objBonusPerStage;grantXp(s,xp,'objective',o.id,`${manual?'Manual':'Automatic'} objective completion: ${o.title}`,now);o.status='complete';o.completedAt=new Date(now).toISOString();o.paidXp=xp;return {objective:o,payout:xp}}
function deleteObjective(s,id){s.objectives=s.objectives.filter(o=>o.id!==id);s.tasks.forEach(t=>{if(t.objectiveId===id)t.objectiveId=null})}
function abandonObjective(s,id,now=Date.now()){const o=s.objectives.find(x=>x.id===id);if(!o)return;if(isRock(o))return abandonRock(s,id,now);grantXp(s,-CONFIG.objAbandonPenalty,'objective',id,`Objective abandoned: ${o.title}`,now);o.status='abandoned';o.abandonedAt=new Date(now).toISOString();s.tasks.filter(t=>t.objectiveId===id).forEach(t=>t.objectiveId=null);return o}
function planStatus(p,now=Date.now()){if(p.launchedAt)return'launched';const st=new Date(`${p.date}T${p.start}`).getTime();if(now>st+Number(p.window)*60000)return'missed';if(now>=st)return'ready';return'upcoming'}
function reservedStageIds(s,now=Date.now()){const out=new Set;(s.planned||[]).filter(p=>['upcoming','ready'].includes(planStatus(p,now))).forEach(p=>(p.stages||[]).forEach(id=>out.add(id)));return out}
function multiplierForSession(s,session){const heat=CONFIG.heatLadder[Math.min(CONFIG.heatLadder.length-1,session.items.filter(i=>i.done).length)]||1;let m=heat*(session.firstBlood?CONFIG.firstBloodMult:1)*(session.mysteryMult||1)*(session.weekend?1.1:1);return Math.min(CONFIG.sessionXpCeilingMult,m)}
function scoreSession(s,session,now=Date.now()){const mult=multiplierForSession(s,session),done=session.items.filter(i=>i.done),missed=session.items.filter(i=>!i.done);let earned=0,banked=0,momentumRocks=new Set;done.forEach(item=>{const t=s.tasks.find(x=>x.id===item.taskId);if(!t)return;const o=s.objectives.find(x=>x.id===t.objectiveId);const live=o&&isRock(o);const atomic=!t.stages?.length||item.atomic;const base=live?CONFIG.rockSubStageCredit:(atomic?CONFIG.rockNonRockAtomicXp:CONFIG.rockSubStageCredit);const value=Math.round(base*mult);const r=grantXp(s,value,live?'rock':'session',item.stageId||t.id,`Session completion: ${item.title}`,now);if(!r.blocked){earned+=value;if(live){o.advanceXp=(o.advanceXp||0)+value;banked+=value;momentumRocks.add(o.id)}}});momentumRocks.forEach(id=>{const v=Math.round(CONFIG.rockSessionMomentumXp*mult);const r=grantXp(s,v,'rock',id,'Rock session momentum',now);if(!r.blocked)earned+=v});const penalty=missed.length*CONFIG.missPenaltyPerStage;if(penalty)grantXp(s,-penalty,'session',session.id,`${missed.length} missed committed stage(s)`,now);return {earned,penalty,net:earned-penalty,mult,banked,missed:missed.length,committed:session.items.length}}
function uniqueDays(actions){return [...new Set((actions||[]).map(a=>a.date))].sort()}
function maxConsecutiveDays(actions){const ds=uniqueDays(actions).map(x=>new Date(x+'T12:00:00').getTime());let best=0,run=0,prev=null;ds.forEach(t=>{run=prev!==null&&Math.round((t-prev)/86400000)===1?run+1:1;best=Math.max(best,run);prev=t});return best}

function render(){renderNav();const views=$('#views');views.innerHTML=`<section id="view-${activeView}" class="view active">${renderView(activeView)}</section>`;bindCommon();if(activeView==='session'||activeView==='dashboard')startTimerLoop();else stopTimerLoop();}
function renderNav(){const nav=$('#nav');nav.innerHTML=NAV.map(([id,label])=>`<button data-nav="${id}" class="${activeView===id?'active':''}">${label}</button>`).join('');$$('[data-nav]').forEach(b=>b.onclick=()=>{activeView=b.dataset.nav;render()})}
function renderView(id){return ({dashboard:renderDashboard,tasks:renderTasks,objectives:renderObjectives,rocks:renderRocks,session:renderSession,waiting:renderWaiting,reading:renderReading,journal:renderJournal,character:renderCharacter,completed:renderCompleted,rewards:renderRewards,audit:renderAudit,export:renderExport,account:renderAccount}[id]||(()=>''))()}
function levelMetrics(){const l=state.level,next=E.xpForLevel(l+1),base=E.xpForLevel(l),pct=next===base?100:Math.max(0,Math.min(100,(state.cumulativeXp-base)/(next-base)*100));return{l,next,base,pct,into:state.cumulativeXp-base,toNext:next-state.cumulativeXp}}
function hero(){const m=levelMetrics();return `<div class="hero"><div class="metric"><div class="label">Level</div><div class="value">${m.l}</div><div class="sub">${fmt(m.toNext)} XP to next</div></div><div class="metric"><div class="label">Lifetime XP</div><div class="value">${fmt(state.cumulativeXp)}</div><div class="sub"><div class="progress"><i style="width:${m.pct}%"></i></div></div></div><div class="metric"><div class="label">Spendable</div><div class="value">${fmt(state.spendableXp)}</div><div class="sub">reward wallet</div></div><div class="metric"><div class="label">Clean days</div><div class="value">${state.consecutiveCleanDays}</div><div class="sub">rock payout ×${E.streakMult(state).toFixed(2)}</div></div></div>`}
function activeRockCards(){const rocks=E.activeRocks(state).sort((a,b)=>a.priority-b.priority);if(!rocks.length)return`<div class="item muted">No active rocks. Promote an active objective when it deserves a clock.</div>`;return rocks.map(o=>{const rs=E.rockState(o),late=rs==='overdue';return`<div class="item"><div class="between"><div><span class="pill p${o.priority}">P${o.priority}</span> <strong>${esc(o.title)}</strong><div class="item-meta">${esc(domain(o.domain).nm)} · advance ${fmt(o.advanceXp||0)} XP · recommit ${o.recommits||0}/${E.CONFIG.rockRecommitMax}</div></div><div class="clock ${late?'danger':''}">${countdown(o.deadline)}</div></div><div class="row" style="margin-top:9px"><button class="btn good small" data-rock-land="${o.id}">Land ${late?'late':'now'}</button>${late?`<button class="btn small" data-rock-recommit="${o.id}" ${(o.recommits||0)>=E.CONFIG.rockRecommitMax?'disabled':''}>Re-commit −${E.CONFIG.rockRecommitFee}</button>`:''}<button class="btn danger small" data-rock-abandon="${o.id}">Abandon</button></div></div>`}).join('')}
function weekRockPace(){const today=new Date(),dow=(today.getDay()+6)%7,start=new Date(today);start.setHours(0,0,0,0);start.setDate(start.getDate()-dow);const landed=state.objectives.filter(o=>o.landedAt&&new Date(o.landedAt)>=start).length,target=Number(state.weeklyRockTarget)||3,expected=target*((dow+1)/7),gap=Math.max(0,expected-landed);return{landed,target,gap,intensity:gap}}
function morningWidget(){const d=E.dayKey(),m=state.morning[d]||{};const mins=x=>{if(!x)return null;const[a,b]=x.split(':').map(Number);return a*60+b},gap=(a,b)=>a!=null&&b!=null?b-a:null;const g1=gap(mins(m.wake),mins(m.up)),g2=gap(mins(m.wake),mins(m.op));return`<div class="card"><div class="between"><h3>Morning stamps</h3><span class="pill">${d}</span></div><div class="formgrid"><div class="field"><label>Wake</label><input type="time" data-morning="wake" value="${m.wake||''}"></div><div class="field"><label>Out of bed</label><input type="time" data-morning="up" value="${m.up||''}"></div><div class="field"><label>Operational</label><input type="time" data-morning="op" value="${m.op||''}"></div><div class="field"><label>Gaps</label><div class="input mono">${g1==null?'—':g1+'m'} / ${g2==null?'—':g2+'m'}</div></div></div><div class="item-meta">wake → up / wake → operational</div></div>`}
function renderDashboard(){const pace=weekRockPace(),today=E.dayKey(),logs=state.dailyLog[today]?.ticks||[];return `${hero()}<div class="card quote"><blockquote>“${esc(quoteOnLoad.text)}”</blockquote><cite>${esc(quoteOnLoad.who)} · ${quoteOnLoad.fuel.toUpperCase()} FUEL</cite></div>${morningWidget()}${pace.gap>0?`<div class="card" style="border-color:${pace.intensity>2?'var(--oxide)':'var(--amber)'}"><div class="between"><strong>PACE GAP</strong><span class="pill ${pace.intensity>2?'overdue':''}">${pace.landed}/${pace.target} rocks</span></div><div style="font:700 ${18+pace.gap*3}px var(--serif);margin-top:8px">You are ${pace.gap.toFixed(1)} behind expected weekly pace. Close it.</div></div>`:''}<div class="section-title"><h2>Live rocks</h2><div class="rule"></div></div>${activeRockCards()}<div class="grid2"><div><div class="section-title"><h2>Execution</h2><div class="rule"></div></div>${state.currentSession?renderCurrentSessionMini():`<div class="card"><h3>No session running</h3><p class="muted">Build a bounded window around work that matters.</p><button class="btn primary" data-nav="session">Start a session</button></div>`}${renderTimeline()}</div><div><div class="section-title"><h2>Avenues of attack</h2><div class="rule"></div></div>${renderRoster()}<div class="item-meta">Today: ${logs.length} actions logged.</div></div></div>`}
function renderCurrentSessionMini(){const s=state.currentSession,done=s.items.filter(i=>i.done).length;return`<div class="card"><div class="between"><div><span class="pill">RUNNING</span><h3 style="margin-top:8px">${esc(s.label||'Focus session')}</h3><div class="item-meta">${done}/${s.items.length} committed items complete</div></div><div class="clock" data-mini-timer>--:--</div></div><button class="btn primary" style="margin-top:10px" data-nav="session">Open session</button></div>`}
function renderRoster(){return state.roster.map(g=>`<div class="card"><div class="between"><div><h3>${esc(g.label)}</h3><span class="pill">${esc(domain(g.domain).nm)}</span></div><div class="row"><button class="btn small" data-add-chip="${g.id}">Add</button><button class="btn small" data-edit-roster="${g.id}">Edit</button></div></div><div class="roster">${g.chips.map(c=>{const done=(state.dailyLog[E.dayKey()]?.ticks||[]).includes(c.id);return`<button class="chip ${done?'done':''} ${c.t==='season'?'season':''} ${c.t==='flag'?'flag':''}" data-chip="${c.id}" data-group="${g.id}" title="Right-click to remove">${esc(c.n)}</button>`}).join('')}</div></div>`).join('')}
function openUnitRows(){const reserved=E.reservedStageIds(state);const rows=[];state.tasks.forEach(t=>{const o=state.objectives.find(x=>x.id===t.objectiveId);if(t.stages?.length)t.stages.forEach(z=>{if(!z.completed)rows.push({key:z.id,taskId:t.id,stageId:z.id,title:z.title,task:t,objective:o,reserved:reserved.has(z.id),atomic:false,waiting:z.waiting||t.waiting})});else if(!t.completed)rows.push({key:t.id,taskId:t.id,stageId:null,title:t.title,task:t,objective:o,reserved:reserved.has(t.id),atomic:true,waiting:t.waiting})});return rows}
function renderTasks(){const reserved=E.reservedStageIds(state);return `${hero()}<div class="between"><div class="section-title" style="flex:1"><h2>All tasks</h2><div class="rule"></div></div><div class="tabs-toggle"><button data-task-mode="list" class="${taskMode==='list'?'active':''}">List</button><button data-task-mode="tree" class="${taskMode==='tree'?'active':''}">Tree</button></div></div><div class="card"><h3>Add work</h3><div class="formgrid"><div class="field wide"><label>Task / slash-separated stages</label><input id="taskTitle" placeholder="Draft proposal / outline / evidence / final pass"></div><div class="field"><label>Objective</label><select id="taskObjective"><option value="">Unassigned</option>${state.objectives.filter(o=>['active','backlog'].includes(o.status)).map(o=>`<option value="${o.id}">${esc(o.title)}</option>`).join('')}</select></div><div class="field"><label>Due</label><input id="taskDue" type="date"></div><div class="field"><label>Repeat</label><select id="taskRecur"><option value="">None</option><option value="daily">Daily</option><option value="weekly">Weekly</option></select></div><div class="field"><label>Action</label><button id="addTask" class="btn primary">Add task</button></div></div></div>${taskMode==='list'?renderTaskList(reserved):renderTaskTree()}`}
function renderTaskList(reserved){const rows=openUnitRows();const unplanned=rows.filter(x=>!x.reserved),planned=rows.filter(x=>x.reserved);const section=(title,arr)=>`<div class="card"><div class="between"><h3>${title}</h3><span class="pill">${arr.length}</span></div>${arr.length?arr.map(r=>`<div class="item"><div class="check"><input type="checkbox" class="bulk-unit" value="${r.key}" ${r.reserved?'disabled':''}><div style="flex:1"><div class="between"><div><strong>${esc(r.title)}</strong><div class="item-meta">${esc(r.task.title)} · ${esc(r.objective?.title||'Unassigned')} ${r.task.dueDate?'· due '+r.task.dueDate:''}</div></div><div class="row">${r.objective&&E.isRock(r.objective)?`<span class="pill p${r.objective.priority}">P${r.objective.priority}</span>`:''}${r.waiting?'<span class="pill">WAITING</span>':''}${r.reserved?'<span class="pill">RESERVED</span>':`<button class="btn small" data-send-unit="${r.key}">→ session</button>`}<button class="btn good small" data-complete-unit="${r.key}">Done</button><button class="btn small" data-wait-unit="${r.key}">${r.waiting?'Unblock':'Wait'}</button></div></div></div></div>`).join(''):'<div class="muted">None.</div>'}</div>`;return `<div class="card"><div class="between"><strong>Bulk actions</strong><div class="row"><input id="bulkDue" type="date" style="width:auto"><button class="btn small" id="bulkSetDue">Set due</button><button class="btn small" id="bulkSession">Send to session</button><button class="btn danger small" id="bulkPurge">Purge</button></div></div></div>${section('Unplanned',unplanned)}${section('Planned / reserved',planned)}`}
function renderTaskTree(){const buckets=[...DOMAINS.map(d=>({d,objectives:state.objectives.filter(o=>o.domain===d.id)})),{d:{id:'unassigned',nm:'Unassigned',sub:'work without an objective'},objectives:[]}];return buckets.map(b=>{let objs=b.objectives.filter(o=>['active','backlog'].includes(o.status));let loose=b.d.id==='unassigned'?state.tasks.filter(t=>!t.objectiveId):[];if(!objs.length&&!loose.length)return'';return`<div class="card"><div class="domain-head">${esc(b.d.nm)} <span class="muted">// ${esc(b.d.sub)}</span></div>${objs.map(o=>`<details open><summary><div class="between"><strong>${esc(o.title)}</strong><div>${E.isRock(o)?`<span class="pill p${o.priority}">P${o.priority}</span>`:''}<span class="pill">${o.status}</span></div></div></summary><div class="tree-body">${state.tasks.filter(t=>t.objectiveId===o.id).map(renderTreeTask).join('')||'<div class="muted">No tasks.</div>'}</div></details>`).join('')}${loose.map(renderTreeTask).join('')}</div>`}).join('')}
function renderTreeTask(t){return`<div class="indent"><details open><summary><div class="between"><span>${t.completed?'✓ ':''}${esc(t.title)}</span><span class="pill">${E.taskCompletedUnits(t)}/${E.taskUnits(t)}</span></div></summary><div class="tree-body">${t.stages?.length?t.stages.map(z=>`<div class="item between"><span>${z.completed?'✓ ':''}${esc(z.title)}</span>${!z.completed?`<button class="btn small" data-send-unit="${z.id}">→ session</button>`:''}</div>`).join(''):`<div class="item between"><span>Atomic task</span>${!t.completed?`<button class="btn small" data-send-unit="${t.id}">→ session</button>`:''}</div>`}</div></details></div>`}
function renderObjectives(){const active=state.objectives.filter(o=>o.status==='active'),backlog=state.objectives.filter(o=>o.status==='backlog'),done=state.objectives.filter(o=>['complete','abandoned'].includes(o.status));return `${hero()}<div class="card"><h3>Create objective</h3><div class="formgrid"><div class="field wide"><label>Title</label><input id="objTitle" placeholder="Land the council automation offer"></div><div class="field"><label>Domain</label><select id="objDomain">${DOMAINS.map(d=>`<option value="${d.id}">${d.nm}</option>`).join('')}</select></div><div class="field"><label>Status</label><select id="objStatus"><option value="active">Active</option><option value="backlog">Backlog</option></select></div><div class="field"><label>Due date</label><input id="objDue" type="date"></div><div class="field"><label>Action</label><button id="addObjective" class="btn primary">Create</button></div></div></div><div class="card"><div class="between"><h3>Promote an active objective to a rock</h3><span class="pill">${E.activeRocks(state).length}/4</span></div><div class="formgrid"><div class="field wide"><label>Objective</label><select id="rockObjective"><option value="">Choose active objective</option>${active.filter(o=>!E.isRock(o)).map(o=>`<option value="${o.id}">${esc(o.title)}</option>`).join('')}</select></div><div class="field"><label>Priority</label><select id="rockPriority">${[1,2,3,4].map(p=>`<option value="${p}">P${p} · ${E.CONFIG.rockClockHours[p]}h</option>`).join('')}</select></div><div class="field"><label>Action</label><button id="makeRock" class="btn primary">Start clock</button></div></div></div>${objectiveSection('Active',active)}${objectiveSection('Backlog',backlog)}${objectiveSection('Completed / abandoned',done)}`}
function objectiveSection(title,arr){return`<div class="section-title"><h2>${title}</h2><div class="rule"></div><span class="pill">${arr.length}</span></div><div class="card">${arr.length?arr.map(o=>{const tasks=state.tasks.filter(t=>t.objectiveId===o.id),done=E.objectiveCompletedUnits(state,o.id),total=E.objectiveUnits(state,o.id);return`<div class="item"><div class="between"><div><div class="item-title">${esc(o.title)}</div><div class="item-meta">${esc(domain(o.domain).nm)} · ${done}/${total} units ${o.dueDate?'· due '+o.dueDate:''}</div></div><div class="row">${E.isRock(o)?`<span class="pill p${o.priority}">P${o.priority} ${countdown(o.deadline)}</span>`:''}<span class="pill ${o.status==='complete'?'done':''}">${o.status}</span></div></div>${['active','backlog'].includes(o.status)?`<div class="row" style="margin-top:9px">${o.status==='backlog'?`<button class="btn small" data-activate-obj="${o.id}">Activate</button>`:''}${E.isRock(o)?`<button class="btn small" data-unrock="${o.id}">Remove clock</button>`:''}<button class="btn good small" data-complete-obj="${o.id}">Complete</button><button class="btn danger small" data-abandon-obj="${o.id}">Abandon</button><button class="btn ghost small" data-delete-obj="${o.id}">Delete</button></div>`:''}${tasks.length?`<div class="indent" style="margin-top:9px">${tasks.slice(0,5).map(t=>`<div class="item-meta">${t.completed?'✓':'○'} ${esc(t.title)}</div>`).join('')}${tasks.length>5?`<div class="item-meta">+${tasks.length-5} more</div>`:''}</div>`:''}</div>`}).join(''):'<div class="muted">None.</div>'}</div>`}
function renderSession(){if(state.currentSession){const ghost=state.currentSession.deviceId!==state.deviceId;return `${hero()}${ghost?renderGhostSession():renderRunningSession()}`}
const units=openUnitRows().filter(x=>!x.reserved);return `${hero()}<div class="card"><div class="between"><h2 class="serif">Build a focus window</h2><span class="pill">${builderSelected.size} selected</span></div><div class="formgrid"><div class="field"><label>Window</label><select id="sessionWindow">${[15,20,30,45,60,90,120].map(n=>`<option value="${n}" ${n===45?'selected':''}>${n} minutes</option>`).join('')}</select></div><div class="field wide"><label>Label</label><input id="sessionLabel" placeholder="One bounded attack"></div><div class="field"><label>Action</label><button id="startSession" class="btn primary">Start session</button></div><div class="field full"><label>Quick add (slashes become stages)</label><input id="sessionQuick" value="${esc(builderQuick)}" placeholder="New task / first stage / second stage"></div></div></div><div class="grid2"><div class="card"><div class="between"><h3>Available work</h3><span class="pill">reserved work hidden</span></div>${units.length?units.map(u=>`<label class="item check"><input type="checkbox" class="session-unit" value="${u.key}" ${builderSelected.has(u.key)?'checked':''}><span><strong>${esc(u.title)}</strong><span class="item-meta">${esc(u.objective?.title||'Unassigned')} ${u.objective&&E.isRock(u.objective)?'· P'+u.objective.priority:''}</span></span></label>`).join(''):'<div class="muted">No open work.</div>'}</div><div>${renderPlans()}${renderSchedulerControls()}${renderTimeline()}</div></div>`}
function renderGhostSession(){const s=state.currentSession;return`<div class="card"><span class="pill overdue">SESSION FROM ANOTHER DEVICE</span><h2 class="serif">${esc(s.label||'Focus session')}</h2><p class="muted">Keep completed ticks and heat, then bind the timer here. An expired or cross-day clock will restart at the original full window.</p><div class="row"><button class="btn primary" id="takeOverSession">Take Over Here</button><button class="btn danger" id="discardSession">Discard</button></div></div>`}
function renderRunningSession(){const s=state.currentSession,done=s.items.filter(i=>i.done).length;return`<div class="card"><div class="between"><div><span class="pill">LIVE WINDOW</span><h2 class="serif">${esc(s.label||'Focus session')}</h2></div><span class="pill">${done}/${s.items.length}</span></div><div class="timer" id="timerDisplay">--:--</div><div class="heat">HEAT ×${E.CONFIG.heatLadder[Math.min(E.CONFIG.heatLadder.length-1,done.length||done)]||1} · FIRST BLOOD ${s.firstBlood?'ON':'OFF'} · MYSTERY ×${s.mysteryMult||1}</div><div class="stack" style="margin-top:18px">${s.items.map((i,n)=>`<div class="item between"><div class="check"><input type="checkbox" data-session-tick="${n}" ${i.done?'checked':''}><div><strong>${esc(i.title)}</strong><div class="item-meta">${i.waiting?'waiting · still in commitment denominator':'committed'}</div></div></div><button class="btn small" data-session-wait="${n}">${i.waiting?'Unblock':'Waiting'}</button></div>`).join('')}</div><div class="row" style="margin-top:14px"><button class="btn good" id="finishSession">Reconcile & bank</button><button class="btn danger" id="discardSession">Discard session</button></div></div>`}
function renderPlans(){const now=Date.now();return`<div class="card"><div class="between"><h3>Planned sessions</h3><button class="btn small" id="newPlan">New plan</button></div>${state.planned.length?state.planned.slice().sort((a,b)=>(a.date+a.start).localeCompare(b.date+b.start)).map(p=>{const st=E.planStatus(p,now);return`<div class="item"><div class="between"><div><strong>${esc(p.label||'Planned session')}</strong><div class="item-meta">${p.date} ${p.start} · ${p.window}m · ${p.stages.length} units</div></div><span class="pill ${st==='missed'?'overdue':''}">${st}</span></div><div class="row" style="margin-top:7px">${['ready','upcoming'].includes(st)?`<button class="btn small" data-launch-plan="${p.id}">Launch</button>`:''}<button class="btn danger small" data-delete-plan="${p.id}">Delete</button></div></div>`}).join(''):'<div class="muted">No plans.</div>'}</div>`}
function renderSchedulerControls(){return`<div class="card"><h3>Add calendar commitment</h3><div class="formgrid"><div class="field wide"><label>Type</label><input id="eventType" placeholder="Client call"></div><div class="field"><label>Date</label><input id="eventDate" type="date" value="${E.dayKey()}"></div><div class="field"><label>Start</label><input id="eventStart" type="time"></div><div class="field"><label>End</label><input id="eventEnd" type="time"></div><div class="field"><label>Action</label><button class="btn" id="addEvent">Add event</button></div></div></div>`}
function renderTimeline(){const date=E.dayKey(),events=state.events.filter(e=>e.date===date),start=6,end=22,span=end-start;let lines='';for(let h=start;h<=end;h+=2){const l=(h-start)/span*100;lines+=`<div class="gridline" style="left:${l}%"></div><div class="gridlabel" style="left:${l}%">${String(h).padStart(2,'0')}</div>`}const blocks=events.map(ev=>{const mins=x=>{const[a,b]=x.split(':').map(Number);return a+b/60},l=(mins(ev.start)-start)/span*100,w=(mins(ev.end)-mins(ev.start))/span*100;return`<div class="event-block" style="left:${Math.max(0,l)}%;width:${Math.max(1,w)}%" title="${esc(ev.type)}"><span>${esc(ev.type)}</span></div>`}).join('');const n=new Date(),nh=n.getHours()+n.getMinutes()/60,nl=(nh-start)/span*100;return`<div class="card"><div class="between"><h3>Today’s timeline</h3><span class="pill">06–22</span></div><div class="timeline">${lines}${blocks}${nl>=0&&nl<=100?`<div class="nowline" style="left:${nl}%"></div>`:''}</div></div>`}
function allBooks(){return [...SEED_BOOKS.filter(b=>!state.reading.removed.includes(b.id)),...state.reading.custom]}
function renderReading(){const books=allBooks(),read=books.filter(b=>(state.reading.status[b.id]||'unread')==='read').length,reading=books.filter(b=>state.reading.status[b.id]==='reading').length;return `${hero()}<div class="hero"><div class="metric"><div class="label">Canon read</div><div class="value">${read}/${books.length}</div></div><div class="metric"><div class="label">In progress</div><div class="value">${reading}</div></div><div class="metric"><div class="label">Reading XP</div><div class="value">5</div><div class="sub">per logged session</div></div><div class="metric"><div class="label">Finish XP</div><div class="value">25</div><div class="sub">per book</div></div></div><div class="card"><h3>Add a book</h3><div class="formgrid"><div class="field wide"><label>Title</label><input id="bookTitle"></div><div class="field"><label>Author</label><input id="bookAuthor"></div><div class="field"><label>Section</label><select id="bookSection">${SECTIONS.map(s=>`<option>${esc(s)}</option>`).join('')}</select></div><div class="field"><label>Domain</label><select id="bookDomain"><option value="mind">Mind</option><option value="faith">Faith</option></select></div><div class="field"><label>Action</label><button id="addBook" class="btn primary">Add book</button></div></div></div>${SECTIONS.map(sec=>{const list=books.filter(b=>b.s===sec);if(!list.length)return'';return`<div class="card"><div class="between"><h3>${esc(sec)}</h3><span class="pill">${list.filter(b=>state.reading.status[b.id]==='read').length}/${list.length}</span></div>${list.map(renderBook).join('')}</div>`}).join('')}`}
function renderBook(b){const st=state.reading.status[b.id]||'unread',dom=b.domain||((b.s==='The Contemplative Spine')?'faith':'mind');return`<div class="book"><button class="statusbtn ${st}" data-book-status="${b.id}">${st}</button><div><strong>${esc(b.t)}</strong><div class="item-meta">${esc(b.a)} · ${esc(dom)}</div><textarea data-book-notes="${b.id}" placeholder="Reading notes">${esc(state.reading.notes[b.id]||'')}</textarea></div><div class="book-actions stack"><button class="btn small" data-read-log="${b.id}">Log 5 XP</button><button class="btn danger small" data-remove-book="${b.id}">Remove</button></div></div>`}

  $('#armReset')?.addEventListener('click',()=>{if(confirm('Arm the 24-hour character reset cooldown?'))mutate(()=>E.armReset(state),'Reset armed')});$('#standDownReset')?.addEventListener('click',()=>mutate(()=>state.resetRequestedAt=null,'Reset stood down'));$('#executeReset')?.addEventListener('click',()=>{if(confirm('This wipes all XP progression. Continue?'))mutate(()=>E.executeReset(state,$('#resetPhrase').value),'Character reset')});
  $('#restoreState')?.addEventListener('click',()=>{if(!confirm('Replace the current state with this backup?'))return;try{const raw=JSON.parse($('#restoreJson').value);state=migrate(raw);saveState();render();toast('State restored')}catch(e){toast('Invalid JSON backup')}});
  $('#runTests')?.addEventListener('click',runBrowserTests);
}
function testState(){const s=blankState();s.roster=[];s.objectives=[];s.tasks=[];s.xpTransactions=[];s.cumulativeXp=s.spendableXp=s.dailyXp=0;return s}
function runIntegrityTests(){const out=[],test=(name,fn)=>{try{fn();out.push({name,ok:true})}catch(e){out.push({name,ok:false,error:e.message})}},eq=(a,b,m='')=>{if(a!==b)throw Error(`${m} expected ${b}, got ${a}`)},ok=(v,m='assertion failed')=>{if(!v)throw Error(m)};
  test('Quadratic level curve',()=>{eq(E.xpForLevel(1),0);eq(E.xpForLevel(2),500);eq(E.xpForLevel(3),2000);eq(E.levelFromXp(1999),2);eq(E.levelFromXp(2000),3)});
  test('Dual wallet earns and penalties preserve lifetime',()=>{const s=testState();E.grantXp(s,100,'test','a','earn');E.grantXp(s,-40,'test','b','penalty');eq(s.cumulativeXp,100);eq(s.spendableXp,60);eq(s.xpTransactions.length,2)});
  test('Ledger recomputes cleanly',()=>{const s=testState();E.grantXp(s,100,'test','a','earn');E.grantXp(s,-40,'test','b','penalty');ok(E.auditWallet(s).ok)});
  test('Rock priority scarcity and derived overdue',()=>{const s=testState(),now=Date.now();s.objectives.push({id:'a',title:'A',status:'active'},{id:'b',title:'B',status:'active'});E.makeRock(s,'a',1,now);let threw=false;try{E.makeRock(s,'b',1,now)}catch{threw=true}ok(threw);eq(E.rockState(s.objectives[0],now),'active');eq(E.rockState(s.objectives[0],now+25*3600000),'overdue')});
  test('Anti-farming gate blocks trivia but permits every live rock',()=>{const s=testState(),now=Date.now();s.objectives.push({id:'late',title:'Late',status:'active',priority:1,deadline:new Date(now-1).toISOString()},{id:'other',title:'Other',status:'active',priority:2,deadline:new Date(now+1e7).toISOString()});s.tasks.push({id:'tl',objectiveId:'late',stages:[{id:'sl'}]},{id:'to',objectiveId:'other',stages:[{id:'so'}]},{id:'x',objectiveId:null,stages:[]});ok(E.earnFrozenByGate(s,'task','x',now));ok(!E.earnFrozenByGate(s,'task','sl',now));ok(!E.earnFrozenByGate(s,'task','so',now));ok(!E.earnFrozenByGate(s,'rock','late',now))});
  test('On-time and late landing maths hold hard cap',()=>{const s=testState(),now=Date.now();s.objectives.push({id:'r',title:'R',status:'active',priority:1,deadline:new Date(now+1000).toISOString(),advanceXp:0});eq(E.rockLandingPayout(s,s.objectives[0],now).xp,1250);s.objectives[0].deadline=new Date(now-1).toISOString();eq(E.rockLandingPayout(s,s.objectives[0],now).xp,200);[1,2,3].forEach(p=>{const late={status:'active',priority:p,deadline:new Date(now-1).toISOString(),advanceXp:0},next={status:'active',priority:p+1,deadline:new Date(now+1e6).toISOString(),advanceXp:0};ok(E.rockLandingPayout(s,late,now).xp<E.rockLandingPayout(s,next,now).xp)})});
  test('Advance credit nets into landing',()=>{const s=testState(),now=Date.now();const o={id:'r',title:'R',status:'active',priority:2,deadline:new Date(now+1000).toISOString(),advanceXp:125};s.objectives.push(o);eq(E.rockLandingPayout(s,o,now).xp,625)});
  test('Streak multiplier caps at 1.5',()=>{const s=testState();s.consecutiveCleanDays=4;eq(E.streakMult(s),1.2);s.consecutiveCleanDays=50;eq(E.streakMult(s),1.5)});
  test('Recommit charges once and resets streak',()=>{const s=testState(),now=Date.now();s.spendableXp=200;s.xpTransactions.push({amount:200,lifetimeXpChange:200});s.cumulativeXp=200;s.objectives.push({id:'r',title:'R',status:'active',priority:1,deadline:new Date(now-1).toISOString(),recommits:0});s.consecutiveCleanDays=7;E.recommitRock(s,'r',now);eq(s.spendableXp,100);eq(s.consecutiveCleanDays,0);let threw=false;const o=s.objectives[0];o.deadline=new Date(now-1).toISOString();try{E.recommitRock(s,'r',now)}catch{threw=true}ok(threw)});
  test('Rock abandonment frees tasks and resets streak',()=>{const s=testState(),now=Date.now();s.objectives.push({id:'r',title:'R',status:'active',priority:1,deadline:new Date(now+1e6).toISOString()});s.tasks.push({id:'t',objectiveId:'r',stages:[]});s.consecutiveCleanDays=5;E.abandonRock(s,'r',now);eq(s.objectives[0].status,'abandoned');eq(s.tasks[0].objectiveId,null);eq(s.consecutiveCleanDays,0)});
  test('Objective manual completion pays completed units only',()=>{const s=testState();s.objectives.push({id:'o',title:'O',status:'active'});s.tasks.push({id:'t',objectiveId:'o',stages:[{completed:true},{completed:false}]});const r=E.completeObjective(s,'o',true);eq(r.payout,75)});
  test('Delete is free; abandon costs spendable only',()=>{const s=testState();E.grantXp(s,500,'test','a','seed');s.objectives.push({id:'d',status:'active',title:'D'},{id:'a',status:'active',title:'A'});E.deleteObjective(s,'d');eq(s.spendableXp,500);E.abandonObjective(s,'a');eq(s.spendableXp,300);eq(s.cumulativeXp,500)});
  test('Session reconciliation can net negative with invariant denominator',()=>{const s=testState();s.tasks.push({id:'t',objectiveId:null,stages:[{id:'a'},{id:'b'}]});const session={id:'s',items:[{taskId:'t',stageId:'a',title:'A',done:true},{taskId:'t',stageId:'b',title:'B',done:false}],firstBlood:false,mysteryMult:1,weekend:false};const r=E.scoreSession(s,session);eq(r.committed,2);eq(r.missed,1);eq(r.earned,28);eq(r.penalty,50);eq(r.net,-22)});
  test('Reservations release on launch, miss and delete',()=>{const s=testState(),now=Date.now();s.planned=[{id:'p',date:E.dayKey(now),start:'23:59',window:30,stages:['x']}];ok(E.reservedStageIds(s,now).has('x'));s.planned[0].launchedAt=new Date().toISOString();ok(!E.reservedStageIds(s,now).has('x'));delete s.planned[0].launchedAt;s.planned[0].date='2000-01-01';ok(!E.reservedStageIds(s,now).has('x'));s.planned=[];ok(!E.reservedStageIds(s,now).has('x'))});
  test('Ladder triggers F, streak and totals',()=>{const s=testState();s.ladderState.body={unlocked:[],actions:[]};E.recordDomainAction(s,'body','a','2026-01-01',TITLES.body);ok(s.ladderState.body.unlocked.includes(0));E.recordDomainAction(s,'body','b','2026-01-02',TITLES.body);E.recordDomainAction(s,'body','c','2026-01-03',TITLES.body);ok(s.ladderState.body.unlocked.includes(1));for(let i=4;i<=10;i++)E.recordDomainAction(s,'body','x'+i,`2026-01-${String(i).padStart(2,'0')}`,TITLES.body);ok(s.ladderState.body.unlocked.includes(2))});
  test('Reset requires cooldown and typed phrase, then zeros streak',()=>{const s=testState(),now=Date.now();s.cumulativeXp=s.spendableXp=100;s.consecutiveCleanDays=9;E.armReset(s,now);let threw=false;try{E.executeReset(s,'RESET',now+23*3600000)}catch{threw=true}ok(threw);E.executeReset(s,'RESET',now+25*3600000);eq(s.cumulativeXp,0);eq(s.consecutiveCleanDays,0)});
  return out;
}
function runBrowserTests(){const results=runIntegrityTests(),el=$('#testResults');el.innerHTML=`<div class="item" style="margin-top:12px"><strong>${results.filter(x=>x.ok).length}/${results.length} passed</strong>${results.map(r=>`<div class="${r.ok?'test-pass':'test-fail'} mono" style="margin-top:5px">${r.ok?'PASS':'FAIL'} · ${esc(r.name)}${r.error?' · '+esc(r.error):''}</div>`).join('')}</div>`}
render();if(auth&&cfg.url&&cfg.key){pullRemoteState().then(()=>{render();syncJournal()})}else setSync(navigator.onLine?'local':'offline');
window.ForgeApp={getState:()=>state,runTests:runIntegrityTests,export:buildExport};
})();
</script>
